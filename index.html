<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CastFlow Receiver</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            cursor: none;
        }

        #videoEl {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            background: #000;
            display: block;
        }

        /* Overlay */
        #overlay {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 0 60px 48px;
            background: linear-gradient(transparent, rgba(0,0,0,0.95));
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 100;
        }

        #overlay.visible {
            transform: translateY(0);
        }

        /* Title */
        #mediaTitle {
            font-size: 28px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 20px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Progress bar */
        .progress-wrapper {
            position: relative;
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            margin-bottom: 16px;
            cursor: pointer;
        }

        #progressFill {
            height: 100%;
            background: #fff;
            border-radius: 2px;
            width: 0%;
            transition: width 0.5s linear;
        }

        #progressHandle {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.2s ease, left 0.5s linear;
        }

        #overlay.visible #progressHandle {
            transform: translate(-50%, -50%) scale(1);
        }

        /* Time + Controls row */
        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .time-display {
            font-size: 16px;
            color: rgba(255,255,255,0.8);
            font-variant-numeric: tabular-nums;
            min-width: 120px;
        }

        /* Action indicators (seek flash) */
        .seek-indicator {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.6);
            color: #fff;
            font-size: 22px;
            font-weight: 600;
            padding: 18px 28px;
            border-radius: 12px;
            opacity: 0;
            transition: opacity 0.15s ease;
            pointer-events: none;
            z-index: 200;
        }

        #seekBack  { left: 80px; }
        #seekFwd   { right: 80px; }

        .seek-indicator.flash {
            opacity: 1;
        }

        /* Play/pause big icon flash */
        #playFlash {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 72px;
            color: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 200;
            transition: opacity 0.15s ease;
            text-shadow: 0 4px 24px rgba(0,0,0,0.8);
        }

        #playFlash.flash {
            opacity: 1;
        }

        /* Waiting / idle screen */
        #waitingScreen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
            gap: 24px;
        }

        #waitingScreen h1 {
            font-size: 36px;
            color: #fff;
            font-weight: 300;
            letter-spacing: 2px;
        }

        #waitingScreen p {
            font-size: 18px;
            color: rgba(255,255,255,0.4);
        }

        #roomCode {
            font-size: 56px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 12px;
            margin: 8px 0;
        }

        .dot-loader {
            display: flex;
            gap: 10px;
        }

        .dot-loader span {
            width: 10px;
            height: 10px;
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
            animation: dotPulse 1.4s ease-in-out infinite;
        }

        .dot-loader span:nth-child(2) { animation-delay: 0.2s; }
        .dot-loader span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotPulse {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Connected toast */
        #toast {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(-80px);
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            color: #fff;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 15px;
            transition: transform 0.4s ease;
            z-index: 400;
            border: 1px solid rgba(255,255,255,0.15);
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <!-- Waiting screen shown before cast starts -->
    <div id="waitingScreen">
        <h1>CASTFLOW</h1>
        <p>Waiting for connection...</p>
        <div id="roomCode">----</div>
        <p style="font-size:14px; color:rgba(255,255,255,0.3);">Enter this code in the extension</p>
        <div class="dot-loader">
            <span></span><span></span><span></span>
        </div>
    </div>

    <!-- Toast notification -->
    <div id="toast"></div>

    <!-- Main video -->
    <video id="videoEl" autoplay playsinline></video>

    <!-- Play/pause flash -->
    <div id="playFlash">▶</div>

    <!-- Seek indicators -->
    <div class="seek-indicator" id="seekBack">⏪ 5s</div>
    <div class="seek-indicator" id="seekFwd">5s ⏩</div>

    <!-- Controls overlay -->
    <div id="overlay">
        <div id="mediaTitle">Loading...</div>
        <div class="progress-wrapper" id="progressWrapper">
            <div id="progressFill"></div>
            <div id="progressHandle"></div>
        </div>
        <div class="controls-row">
            <span class="time-display">
                <span id="currentTimeEl">0:00</span>
                <span style="color:rgba(255,255,255,0.4)"> / </span>
                <span id="durationEl">0:00</span>
            </span>
            <span id="playStateEl" style="font-size:18px; color:rgba(255,255,255,0.7);">▶</span>
            <span style="min-width:120px;"></span>
        </div>
    </div>

    <script>
        // ============================================
        // STATE
        // ============================================

        const state = {
            connected: false,
            playing: false,
            currentTime: 0,
            duration: 0,
            title: '',
            hideTimer: null,
            overlayVisible: false,
            ws: null,
            roomCode: null
        };

        // ============================================
        // ELEMENTS
        // ============================================

        const videoEl         = document.getElementById('videoEl');
        const overlay         = document.getElementById('overlay');
        const waitingScreen   = document.getElementById('waitingScreen');
        const roomCodeEl      = document.getElementById('roomCode');
        const mediaTitle      = document.getElementById('mediaTitle');
        const progressFill    = document.getElementById('progressFill');
        const progressHandle  = document.getElementById('progressHandle');
        const currentTimeEl   = document.getElementById('currentTimeEl');
        const durationEl      = document.getElementById('durationEl');
        const playStateEl     = document.getElementById('playStateEl');
        const playFlash       = document.getElementById('playFlash');
        const seekBack        = document.getElementById('seekBack');
        const seekFwd         = document.getElementById('seekFwd');
        const toast           = document.getElementById('toast');

        // ============================================
        // WEBSOCKET CONNECTION
        // ============================================

        function generateRoomCode() {
            return Math.random().toString(36).substring(2, 6).toUpperCase();
        }

        function connectWS() {
            state.roomCode = generateRoomCode();
            roomCodeEl.textContent = state.roomCode;

            // Connect to signaling server
            // Replace with your Vercel deployment URL
            const wsUrl = `wss://castflow-signal.vercel.app/api/ws?room=${state.roomCode}&role=receiver`;
            state.ws = new WebSocket(wsUrl);

            state.ws.onopen = () => {
                console.log('Connected to signaling server');
            };

            state.ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                handleMessage(msg);
            };

            state.ws.onclose = () => {
                console.log('WS closed, reconnecting...');
                setTimeout(connectWS, 3000);
            };

            state.ws.onerror = (err) => {
                console.error('WS error:', err);
            };
        }

        function handleMessage(msg) {
            switch (msg.type) {
                case 'connected':
                    onCasterConnected(msg);
                    break;
                case 'play':
                    videoEl.play();
                    flashPlayPause('▶');
                    break;
                case 'pause':
                    videoEl.pause();
                    flashPlayPause('⏸');
                    break;
                case 'seek':
                    videoEl.currentTime = msg.time;
                    showOverlay();
                    break;
                case 'seekRelative':
                    videoEl.currentTime = Math.max(0, Math.min(videoEl.duration, videoEl.currentTime + msg.seconds));
                    flashSeek(msg.seconds);
                    showOverlay();
                    break;
                case 'volume':
                    videoEl.volume = msg.volume;
                    break;
                case 'metadata':
                    mediaTitle.textContent = msg.title;
                    state.title = msg.title;
                    break;
                case 'stream':
                    // WebRTC stream will be set as srcObject
                    break;
            }
        }

        function onCasterConnected(msg) {
            state.connected = true;
            waitingScreen.style.display = 'none';
            if (msg.title) {
                mediaTitle.textContent = msg.title;
                state.title = msg.title;
            }
            showToast('📱 Device connected');
        }

        // ============================================
        // OVERLAY
        // ============================================

        function showOverlay() {
            overlay.classList.add('visible');
            state.overlayVisible = true;
            resetHideTimer();
        }

        function hideOverlay() {
            overlay.classList.remove('visible');
            state.overlayVisible = false;
        }

        function resetHideTimer() {
            clearTimeout(state.hideTimer);
            state.hideTimer = setTimeout(hideOverlay, 5000);
        }

        function toggleOverlay() {
            if (state.overlayVisible) {
                hideOverlay();
                clearTimeout(state.hideTimer);
            } else {
                showOverlay();
            }
        }

        // ============================================
        // PROGRESS BAR
        // ============================================

        videoEl.addEventListener('timeupdate', () => {
            const pct = videoEl.duration ? (videoEl.currentTime / videoEl.duration) * 100 : 0;
            progressFill.style.width = pct + '%';
            progressHandle.style.left = pct + '%';
            currentTimeEl.textContent = formatTime(videoEl.currentTime);
            durationEl.textContent = formatTime(videoEl.duration);
            state.currentTime = videoEl.currentTime;
            state.duration = videoEl.duration;
        });

        videoEl.addEventListener('play', () => {
            playStateEl.textContent = '⏸';
        });

        videoEl.addEventListener('pause', () => {
            playStateEl.textContent = '▶';
        });

        // ============================================
        // FLASH ANIMATIONS
        // ============================================

        function flashPlayPause(icon) {
            playFlash.textContent = icon;
            playFlash.classList.add('flash');
            setTimeout(() => playFlash.classList.remove('flash'), 600);
            showOverlay();
        }

        function flashSeek(seconds) {
            const el = seconds < 0 ? seekBack : seekFwd;
            el.textContent = seconds < 0 ? `⏪ ${Math.abs(seconds)}s` : `${seconds}s ⏩`;
            el.classList.add('flash');
            setTimeout(() => el.classList.remove('flash'), 600);
        }

        // ============================================
        // TV REMOTE KEYDOWN
        // ============================================

        document.addEventListener('keydown', (e) => {
            switch (e.keyCode) {
                // OK / Enter / Spacebar → play/pause + toggle overlay
                case 13:
                case 32:
                    if (state.overlayVisible) {
                        videoEl.paused ? videoEl.play() : videoEl.pause();
                        flashPlayPause(videoEl.paused ? '⏸' : '▶');
                    } else {
                        showOverlay();
                    }
                    e.preventDefault();
                    break;

                // D-pad up → show overlay
                case 38:
                    showOverlay();
                    e.preventDefault();
                    break;

                // D-pad down → hide overlay
                case 40:
                    hideOverlay();
                    e.preventDefault();
                    break;

                // D-pad left / Rewind
                case 37:
                case 412:
                    videoEl.currentTime = Math.max(0, videoEl.currentTime - 5);
                    flashSeek(-5);
                    showOverlay();
                    e.preventDefault();
                    break;

                // D-pad right / Fast forward
                case 39:
                case 417:
                    videoEl.currentTime = Math.min(videoEl.duration, videoEl.currentTime + 5);
                    flashSeek(5);
                    showOverlay();
                    e.preventDefault();
                    break;

                // Play button
                case 415:
                    videoEl.play();
                    flashPlayPause('▶');
                    break;

                // Pause button
                case 19:
                    videoEl.pause();
                    flashPlayPause('⏸');
                    break;

                // Play/Pause toggle button
                case 463:
                    videoEl.paused ? videoEl.play() : videoEl.pause();
                    flashPlayPause(videoEl.paused ? '⏸' : '▶');
                    break;
            }
        });

        // ============================================
        // TOAST
        // ============================================

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ============================================
        // HELPERS
        // ============================================

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            if (h > 0) return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        // ============================================
        // INIT
        // ============================================

        connectWS();
    </script>
</body>
</html>
