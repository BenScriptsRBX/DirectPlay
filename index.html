<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CastFlow Receiver</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            cursor: none;
        }

        #videoEl {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            background: #000;
            display: block;
        }

        /* Overlay */
        #overlay {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 0 60px 48px;
            background: linear-gradient(transparent, rgba(0,0,0,0.95));
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 100;
        }

        #overlay.visible { transform: translateY(0); }

        #mediaTitle {
            font-size: 28px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 20px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .progress-wrapper {
            position: relative;
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            margin-bottom: 16px;
        }

        #progressFill {
            height: 100%;
            background: #fff;
            border-radius: 2px;
            width: 0%;
            transition: width 0.5s linear;
        }

        #progressHandle {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.2s ease, left 0.5s linear;
        }

        #overlay.visible #progressHandle {
            transform: translate(-50%, -50%) scale(1);
        }

        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .time-display {
            font-size: 16px;
            color: rgba(255,255,255,0.8);
            font-variant-numeric: tabular-nums;
            min-width: 120px;
        }

        .seek-indicator {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.6);
            color: #fff;
            font-size: 22px;
            font-weight: 600;
            padding: 18px 28px;
            border-radius: 12px;
            opacity: 0;
            transition: opacity 0.15s ease;
            pointer-events: none;
            z-index: 200;
        }

        #seekBack { left: 80px; }
        #seekFwd  { right: 80px; }

        .seek-indicator.flash { opacity: 1; }

        #playFlash {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 72px;
            color: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 200;
            transition: opacity 0.15s ease;
            text-shadow: 0 4px 24px rgba(0,0,0,0.8);
        }

        #playFlash.flash { opacity: 1; }

        /* Waiting screen */
        #waitingScreen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
            gap: 16px;
        }

        #waitingScreen h1 {
            font-size: 42px;
            color: #fff;
            font-weight: 300;
            letter-spacing: 6px;
            margin-bottom: 8px;
        }

        #waitingScreen .label {
            font-size: 15px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        #localIp {
            font-size: 52px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 4px;
            margin: 8px 0;
        }

        #statusMsg {
            font-size: 15px;
            color: rgba(255,255,255,0.4);
            margin-top: 8px;
        }

        .dot-loader {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .dot-loader span {
            width: 8px;
            height: 8px;
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
            animation: dotPulse 1.4s ease-in-out infinite;
        }

        .dot-loader span:nth-child(2) { animation-delay: 0.2s; }
        .dot-loader span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotPulse {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        #toast {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(-80px);
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            color: #fff;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 15px;
            transition: transform 0.4s ease;
            z-index: 400;
            border: 1px solid rgba(255,255,255,0.15);
            white-space: nowrap;
        }

        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div id="waitingScreen">
        <h1>CASTFLOW</h1>
        <p class="label">Connect using this IP</p>
        <div id="localIp">...</div>
        <p class="label">Enter in the CastFlow extension</p>
        <div id="statusMsg">Waiting for connection</div>
        <div class="dot-loader">
            <span></span><span></span><span></span>
        </div>
    </div>

    <div id="toast"></div>
    <video id="videoEl" autoplay playsinline></video>
    <div id="playFlash">▶</div>
    <div class="seek-indicator" id="seekBack">⏪ 5s</div>
    <div class="seek-indicator" id="seekFwd">5s ⏩</div>

    <div id="overlay">
        <div id="mediaTitle">Loading...</div>
        <div class="progress-wrapper">
            <div id="progressFill"></div>
            <div id="progressHandle"></div>
        </div>
        <div class="controls-row">
            <span class="time-display">
                <span id="currentTimeEl">0:00</span>
                <span style="color:rgba(255,255,255,0.4)"> / </span>
                <span id="durationEl">0:00</span>
            </span>
            <span id="playStateEl" style="font-size:18px; color:rgba(255,255,255,0.7);">▶</span>
            <span style="min-width:120px;"></span>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIG — update with your Railway URL
        // ============================================
        const SIGNAL_SERVER = 'wss://your-railway-app.railway.app';

        // ============================================
        // STATE
        // ============================================
        const state = {
            localIp: null,
            ws: null,
            pc: null,
            hideTimer: null,
            overlayVisible: false
        };

        // ============================================
        // ELEMENTS
        // ============================================
        const videoEl       = document.getElementById('videoEl');
        const overlay       = document.getElementById('overlay');
        const waitingScreen = document.getElementById('waitingScreen');
        const localIpEl     = document.getElementById('localIp');
        const statusMsg     = document.getElementById('statusMsg');
        const mediaTitle    = document.getElementById('mediaTitle');
        const progressFill  = document.getElementById('progressFill');
        const progressHandle= document.getElementById('progressHandle');
        const currentTimeEl = document.getElementById('currentTimeEl');
        const durationEl    = document.getElementById('durationEl');
        const playStateEl   = document.getElementById('playStateEl');
        const playFlash     = document.getElementById('playFlash');
        const seekBack      = document.getElementById('seekBack');
        const seekFwd       = document.getElementById('seekFwd');
        const toast         = document.getElementById('toast');

        // ============================================
        // GET LOCAL IP VIA WEBRTC TRICK
        // ============================================
        function getLocalIp() {
            return new Promise((resolve) => {
                const pc = new RTCPeerConnection({ iceServers: [] });
                pc.createDataChannel('');
                pc.createOffer().then(o => pc.setLocalDescription(o));
                pc.onicecandidate = (e) => {
                    if (!e.candidate) return;
                    const match = e.candidate.candidate.match(/(\d+\.\d+\.\d+\.\d+)/);
                    if (match && !match[1].startsWith('127.')) {
                        resolve(match[1]);
                        pc.close();
                    }
                };
                // Fallback after 3s
                setTimeout(() => resolve('unknown'), 3000);
            });
        }

        // ============================================
        // WEBSOCKET + SIGNALING
        // ============================================
        function connectSignaling(ip) {
            state.ws = new WebSocket(SIGNAL_SERVER);

            state.ws.onopen = () => {
                console.log('Connected to signaling server');
                // Register as receiver with our local IP
                send({ type: 'register', ip });
            };

            state.ws.onmessage = async (e) => {
                const msg = JSON.parse(e.data);
                console.log('Signal received:', msg.type);

                switch (msg.type) {
                    case 'registered':
                        statusMsg.textContent = 'Waiting for connection...';
                        break;

                    case 'caster_joined':
                        statusMsg.textContent = 'Caster connected, starting stream...';
                        showToast('📱 Device connected');
                        await startWebRTC();
                        break;

                    case 'offer':
                        await handleOffer(msg.sdp);
                        break;

                    case 'ice':
                        if (state.pc && msg.candidate) {
                            await state.pc.addIceCandidate(new RTCIceCandidate(msg.candidate));
                        }
                        break;

                    case 'play':
                        videoEl.play();
                        flashPlayPause('▶');
                        break;

                    case 'pause':
                        videoEl.pause();
                        flashPlayPause('⏸');
                        break;

                    case 'seek':
                        videoEl.currentTime = msg.time;
                        showOverlay();
                        break;

                    case 'seekRelative':
                        videoEl.currentTime = Math.max(0, Math.min(
                            videoEl.duration,
                            videoEl.currentTime + msg.seconds
                        ));
                        flashSeek(msg.seconds);
                        showOverlay();
                        break;

                    case 'volume':
                        videoEl.volume = msg.volume;
                        break;

                    case 'metadata':
                        mediaTitle.textContent = msg.title;
                        break;

                    case 'caster_disconnected':
                        showToast('📵 Device disconnected');
                        break;

                    case 'error':
                        console.error('Signal error:', msg.message);
                        break;
                }
            };

            state.ws.onclose = () => {
                console.log('Signaling disconnected, reconnecting...');
                setTimeout(() => connectSignaling(ip), 3000);
            };

            state.ws.onerror = (err) => console.error('WS error:', err);
        }

        function send(msg) {
            if (state.ws?.readyState === WebSocket.OPEN) {
                state.ws.send(JSON.stringify(msg));
            }
        }

        // ============================================
        // WEBRTC — receive stream
        // ============================================
        async function startWebRTC() {
            state.pc = new RTCPeerConnection({
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' }
                ]
            });

            // When we receive the stream, attach to video
            state.pc.ontrack = (e) => {
                console.log('Track received:', e.track.kind);
                if (e.streams && e.streams[0]) {
                    videoEl.srcObject = e.streams[0];
                    videoEl.play();
                    waitingScreen.style.display = 'none';
                    showToast('🎬 Stream started');
                }
            };

            // Send ICE candidates to caster via signaling
            state.pc.onicecandidate = (e) => {
                if (e.candidate) {
                    send({ type: 'ice', candidate: e.candidate });
                }
            };

            state.pc.onconnectionstatechange = () => {
                console.log('PC state:', state.pc.connectionState);
                if (state.pc.connectionState === 'connected') {
                    showToast('✅ Peer connected');
                }
            };
        }

        async function handleOffer(sdp) {
            if (!state.pc) await startWebRTC();
            await state.pc.setRemoteDescription(new RTCSessionDescription({ type: 'offer', sdp }));
            const answer = await state.pc.createAnswer();
            await state.pc.setLocalDescription(answer);
            send({ type: 'answer', sdp: answer.sdp });
        }

        // ============================================
        // OVERLAY
        // ============================================
        function showOverlay() {
            overlay.classList.add('visible');
            state.overlayVisible = true;
            resetHideTimer();
        }

        function hideOverlay() {
            overlay.classList.remove('visible');
            state.overlayVisible = false;
        }

        function resetHideTimer() {
            clearTimeout(state.hideTimer);
            state.hideTimer = setTimeout(hideOverlay, 5000);
        }

        // ============================================
        // PROGRESS
        // ============================================
        videoEl.addEventListener('timeupdate', () => {
            const pct = videoEl.duration
                ? (videoEl.currentTime / videoEl.duration) * 100
                : 0;
            progressFill.style.width = pct + '%';
            progressHandle.style.left = pct + '%';
            currentTimeEl.textContent = formatTime(videoEl.currentTime);
            durationEl.textContent = formatTime(videoEl.duration);
        });

        videoEl.addEventListener('play',  () => { playStateEl.textContent = '⏸'; });
        videoEl.addEventListener('pause', () => { playStateEl.textContent = '▶'; });

        // ============================================
        // FLASH ANIMATIONS
        // ============================================
        function flashPlayPause(icon) {
            playFlash.textContent = icon;
            playFlash.classList.add('flash');
            setTimeout(() => playFlash.classList.remove('flash'), 600);
            showOverlay();
        }

        function flashSeek(seconds) {
            const el = seconds < 0 ? seekBack : seekFwd;
            el.textContent = seconds < 0
                ? `⏪ ${Math.abs(seconds)}s`
                : `${seconds}s ⏩`;
            el.classList.add('flash');
            setTimeout(() => el.classList.remove('flash'), 600);
        }

        // ============================================
        // TV REMOTE KEYS
        // ============================================
        document.addEventListener('keydown', (e) => {
            switch (e.keyCode) {
                case 13: // OK/Enter
                case 32: // Space
                    if (state.overlayVisible) {
                        videoEl.paused ? videoEl.play() : videoEl.pause();
                        flashPlayPause(videoEl.paused ? '⏸' : '▶');
                    } else {
                        showOverlay();
                    }
                    e.preventDefault();
                    break;
                case 38: // D-pad up
                    showOverlay();
                    e.preventDefault();
                    break;
                case 40: // D-pad down
                    hideOverlay();
                    e.preventDefault();
                    break;
                case 37: // D-pad left
                case 412: // Rewind
                    videoEl.currentTime = Math.max(0, videoEl.currentTime - 5);
                    flashSeek(-5);
                    showOverlay();
                    e.preventDefault();
                    break;
                case 39: // D-pad right
                case 417: // Fast forward
                    videoEl.currentTime = Math.min(videoEl.duration, videoEl.currentTime + 5);
                    flashSeek(5);
                    showOverlay();
                    e.preventDefault();
                    break;
                case 415: // Play
                    videoEl.play();
                    flashPlayPause('▶');
                    break;
                case 19: // Pause
                    videoEl.pause();
                    flashPlayPause('⏸');
                    break;
            }
        });

        // ============================================
        // TOAST
        // ============================================
        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ============================================
        // HELPERS
        // ============================================
        function formatTime(s) {
            if (!s || isNaN(s)) return '0:00';
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            const sec = Math.floor(s % 60);
            if (h > 0) return `${h}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
            return `${m}:${sec.toString().padStart(2,'0')}`;
        }

        // ============================================
        // INIT
        // ============================================
        async function init() {
            const ip = await getLocalIp();
            state.localIp = ip;
            localIpEl.textContent = ip;
            connectSignaling(ip);
        }

        init();
    </script>
</body>
</html>
