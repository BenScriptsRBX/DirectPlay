<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CastFlow Receiver</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --white: #ffffff;
            --dim: rgba(255,255,255,0.45);
            --dimmer: rgba(255,255,255,0.15);
            --glass: rgba(255,255,255,0.06);
            --glass-border: rgba(255,255,255,0.11);
            --accent: #e8ff47;
        }
        html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family:'DM Sans',sans-serif; -webkit-font-smoothing:antialiased; }
        body { cursor:none; }
        body.cursor-visible { cursor:default; }

        #videoEl {
            position:fixed; inset:0; width:100%; height:100%;
            object-fit:contain; background:#000; z-index:0;
        }

        /* ── Waiting screen ── */
        #waitingScreen {
            position:fixed; inset:0; background:#000;
            display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:50;
        }
        #waitingScreen::before {
            content:''; position:absolute; inset:0;
            background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,0.012) 2px,rgba(255,255,255,0.012) 4px);
            pointer-events:none;
        }
        .wt-logo { font-size:10px; font-weight:600; letter-spacing:8px; color:var(--dim); text-transform:uppercase; margin-bottom:52px; position:relative; z-index:1; }
        .wt-card { background:var(--glass); border:1px solid var(--glass-border); border-radius:20px; padding:48px 64px; display:flex; flex-direction:column; align-items:center; gap:6px; min-width:420px; position:relative; z-index:1; }
        .wt-label { font-size:10px; letter-spacing:3px; color:var(--dim); text-transform:uppercase; margin-bottom:8px; }
        #codeEl { font-family:'DM Mono',monospace; font-size:64px; font-weight:500; color:var(--white); letter-spacing:8px; line-height:1; margin-bottom:10px; }
        .wt-sublabel { font-size:10px; letter-spacing:2px; color:var(--dimmer); text-transform:uppercase; }
        .wt-divider { width:1px; height:28px; background:var(--glass-border); margin:22px 0; }
        #statusMsg { font-size:13px; color:var(--dim); letter-spacing:0.5px; }
        .quality-row { display:flex; gap:8px; margin-top:20px; }
        .q-pill { font-size:11px; font-weight:500; letter-spacing:1px; color:var(--dim); border:1px solid var(--glass-border); background:transparent; border-radius:20px; padding:6px 14px; cursor:pointer; transition:all 0.15s ease; font-family:'DM Sans',sans-serif; }
        .q-pill:hover { border-color:var(--dim); color:var(--white); }
        .q-pill.active { background:var(--white); color:#000; border-color:var(--white); }
        .wt-hint { font-size:10px; letter-spacing:1.5px; color:var(--dimmer); text-transform:uppercase; margin-top:16px; }
        .dot-loader { display:flex; gap:8px; margin-top:14px; }
        .dot-loader span { width:5px; height:5px; background:var(--dimmer); border-radius:50%; animation:dotPulse 1.6s ease-in-out infinite; }
        .dot-loader span:nth-child(2) { animation-delay:.25s; }
        .dot-loader span:nth-child(3) { animation-delay:.5s; }
        @keyframes dotPulse { 0%,80%,100%{transform:scale(.5);opacity:.3} 40%{transform:scale(1);opacity:1} }

        /* ── Overlay ── */
        #overlay { position:fixed; bottom:0; left:0; right:0; padding:0 64px 52px; background:linear-gradient(transparent,rgba(0,0,0,0.92) 60%); transform:translateY(100%); transition:transform 0.35s cubic-bezier(.4,0,.2,1); z-index:20; }
        #overlay.visible { transform:translateY(0); }
        #mediaTitle { font-size:26px; font-weight:600; color:var(--white); margin-bottom:22px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .progress-wrapper { position:relative; width:100%; height:3px; background:var(--dimmer); border-radius:2px; margin-bottom:18px; }
        #progressFill { height:100%; background:var(--white); border-radius:2px; width:0%; transition:width 0.5s linear; }
        #progressHandle { position:absolute; top:50%; transform:translate(-50%,-50%) scale(0); width:14px; height:14px; background:var(--white); border-radius:50%; transition:transform 0.2s ease,left 0.5s linear; }
        #overlay.visible #progressHandle { transform:translate(-50%,-50%) scale(1); }
        .controls-row { display:flex; align-items:center; justify-content:space-between; }
        .time-display { font-family:'DM Mono',monospace; font-size:14px; color:var(--dim); min-width:130px; }
        #playStateEl { font-size:20px; color:var(--dim); }
        #qualityBadge { font-size:11px; font-weight:600; letter-spacing:1.5px; color:var(--dimmer); text-transform:uppercase; min-width:130px; text-align:right; }

        /* ── Seek/pause indicators ── */
        .seek-indicator { position:fixed; top:50%; transform:translateY(-50%); background:rgba(0,0,0,0.55); backdrop-filter:blur(8px); border:1px solid var(--glass-border); color:var(--white); font-size:18px; font-weight:600; padding:16px 28px; border-radius:14px; opacity:0; transition:opacity 0.15s ease; pointer-events:none; z-index:30; }
        #seekBack { left:72px; }
        #seekFwd  { right:72px; }
        .seek-indicator.flash { opacity:1; }
        #playFlash { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); font-size:64px; color:var(--white); opacity:0; pointer-events:none; z-index:30; transition:opacity 0.15s ease; text-shadow:0 4px 32px rgba(0,0,0,0.9); }
        #playFlash.flash { opacity:1; }

        /* ── Seek spinner (shown while re-buffering after seek) ── */
        #seekSpinner {
            position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
            display:none; flex-direction:column; align-items:center; gap:16px; z-index:40;
        }
        #seekSpinner.visible { display:flex; }
        .spinner-ring {
            width:48px; height:48px; border:3px solid var(--dimmer);
            border-top-color:var(--white); border-radius:50%;
            animation:spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform:rotate(360deg); } }
        #seekSpinner p { font-size:13px; color:var(--dim); letter-spacing:1px; }

        /* ── Buffer bar (thin strip at top showing queue depth) ── */
        #bufferBar {
            position:fixed; top:0; left:0; right:0; height:2px;
            background:rgba(255,255,255,0.08); z-index:35;
        }
        #bufferFill {
            height:100%; background:var(--accent);
            width:0%; transition:width 0.3s ease;
        }

        /* ── Toast ── */
        #toast { position:fixed; top:36px; left:50%; transform:translateX(-50%) translateY(-72px); background:rgba(15,15,15,0.9); backdrop-filter:blur(16px); color:var(--white); padding:11px 26px; border-radius:40px; font-size:13px; transition:transform 0.4s cubic-bezier(.4,0,.2,1); z-index:90; border:1px solid var(--glass-border); white-space:nowrap; }
        #toast.show { transform:translateX(-50%) translateY(0); }

        #connectedBar { position:fixed; top:0; left:0; right:0; height:2px; background:var(--accent); transform:scaleX(0); transform-origin:left; transition:transform 0.6s cubic-bezier(.4,0,.2,1); z-index:40; }
        #connectedBar.show { transform:scaleX(1); }

        #unmuteBtn { position:fixed; bottom:40px; right:40px; background:rgba(15,15,15,0.85); backdrop-filter:blur(16px); border:1px solid var(--glass-border); color:var(--white); font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; padding:12px 24px; border-radius:40px; cursor:pointer; z-index:60; display:none; }

        /* ── Quality panel ── */
        #qualityPanel { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0.92); background:rgba(10,10,10,0.92); backdrop-filter:blur(24px); border:1px solid var(--glass-border); border-radius:20px; padding:32px 40px; z-index:80; opacity:0; pointer-events:none; transition:opacity 0.2s ease,transform 0.2s ease; min-width:320px; }
        #qualityPanel.visible { opacity:1; pointer-events:all; transform:translate(-50%,-50%) scale(1); }
        #qualityPanel h3 { font-size:11px; letter-spacing:3px; color:var(--dim); text-transform:uppercase; margin-bottom:20px; text-align:center; }
        .qp-options { display:flex; flex-direction:column; gap:8px; }
        .qp-option { display:flex; align-items:center; justify-content:space-between; padding:12px 18px; border-radius:12px; border:1px solid var(--glass-border); cursor:pointer; background:transparent; color:var(--white); font-family:'DM Sans',sans-serif; font-size:14px; transition:all 0.15s ease; }
        .qp-option:hover { background:var(--glass); border-color:var(--dim); }
        .qp-option.active { background:var(--white); color:#000; border-color:var(--white); }
        .qp-name { font-weight:600; }
        .qp-desc { font-size:12px; color:var(--dim); }
        #qualityPanel .qp-hint { font-size:10px; letter-spacing:1.5px; color:var(--dimmer); text-transform:uppercase; text-align:center; margin-top:18px; }

        #statsBadge { position:fixed; top:18px; right:24px; font-size:11px; font-family:'DM Mono',monospace; color:var(--dimmer); z-index:30; text-align:right; line-height:1.6; }
    </style>
</head>
<body>

<div id="waitingScreen">
    <p class="wt-logo">CastFlow</p>
    <div class="wt-card">
        <p class="wt-label">Your code</p>
        <div id="codeEl">····</div>
        <p class="wt-sublabel">Enter in the CastFlow extension</p>
        <div class="wt-divider"></div>
        <div id="statusMsg">Waiting for device…</div>
        <div class="dot-loader"><span></span><span></span><span></span></div>
        <div class="wt-divider"></div>
        <p class="wt-label">Stream Quality</p>
        <div class="quality-row">
            <button class="q-pill" data-q="720p">720p</button>
            <button class="q-pill active" data-q="1080p">1080p</button>
            <button class="q-pill" data-q="1440p">1440p</button>
            <button class="q-pill" data-q="4k">4K</button>
        </div>
        <p class="wt-hint">Press Q during stream to change</p>
    </div>
</div>

<div id="bufferBar"><div id="bufferFill"></div></div>
<div id="connectedBar"></div>
<div id="toast"></div>
<div id="statsBadge"></div>

<video id="videoEl" autoplay playsinline muted></video>
<button id="unmuteBtn">🔊 Tap to enable audio</button>

<div id="playFlash">▶</div>
<div class="seek-indicator" id="seekBack">⏪ 5s</div>
<div class="seek-indicator" id="seekFwd">5s ⏩</div>
<div id="seekSpinner"><div class="spinner-ring"></div><p>Seeking…</p></div>

<div id="qualityPanel">
    <h3>Stream Quality</h3>
    <div class="qp-options">
        <button class="qp-option" data-q="720p"><span class="qp-name">720p</span><span class="qp-desc">1280 × 720 · Low bandwidth</span></button>
        <button class="qp-option active" data-q="1080p"><span class="qp-name">1080p</span><span class="qp-desc">1920 × 1080 · Recommended</span></button>
        <button class="qp-option" data-q="1440p"><span class="qp-name">1440p</span><span class="qp-desc">2560 × 1440 · High detail</span></button>
        <button class="qp-option" data-q="4k"><span class="qp-name">4K</span><span class="qp-desc">3840 × 2160 · Max quality</span></button>
    </div>
    <p class="qp-hint">Press Q or Esc to close</p>
</div>

<div id="overlay">
    <div id="mediaTitle">—</div>
    <div class="progress-wrapper">
        <div id="progressFill"></div>
        <div id="progressHandle"></div>
    </div>
    <div class="controls-row">
        <span class="time-display"><span id="currentTimeEl">0:00</span><span style="color:var(--dimmer)"> / </span><span id="durationEl">0:00</span></span>
        <span id="playStateEl">▶</span>
        <span id="qualityBadge">1080p</span>
    </div>
</div>

<script>
// ============================================
// CASTFLOW RECEIVER
// OPFS + MediaSource clip-queue player
// ============================================

(() => {
    'use strict';

    const SIGNAL        = '/api/signal';
    const MAX_BUFFER_S  = 1;
    const MIN_AHEAD_S   = 2;

    // ── DOM ───────────────────────────────────────────────────────────────────
    const $ = id => document.getElementById(id);
    const videoEl       = $('videoEl');
    const waitingScreen = $('waitingScreen');
    const statusMsg     = $('statusMsg');
    const codeEl        = $('codeEl');
    const overlay       = $('overlay');
    const mediaTitle    = $('mediaTitle');
    const progressFill  = $('progressFill');
    const progressHandle= $('progressHandle');
    const currentTimeEl = $('currentTimeEl');
    const durationEl    = $('durationEl');
    const playStateEl   = $('playStateEl');
    const qualityBadge  = $('qualityBadge');
    const playFlash     = $('playFlash');
    const seekBack      = $('seekBack');
    const seekFwd       = $('seekFwd');
    const seekSpinner   = $('seekSpinner');
    const bufferFill    = $('bufferFill');
    const toast         = $('toast');
    const connectedBar  = $('connectedBar');
    const unmuteBtn     = $('unmuteBtn');
    const qualityPanel  = $('qualityPanel');
    const statsBadge    = $('statsBadge');

    // ── State ─────────────────────────────────────────────────────────────────
    const state = {
        code:         null,
        pc:           null,
        dc:           null,
        pollTimer:    null,
        hideTimer:    null,
        quality:      '1080p',
        qualityOpen:  false,

        // Clip reassembly
        incomingSeq:  null,
        incomingMime: null,
        incomingSize: null,
        incomingChunks: [],
        incomingReceived: 0,

        // MSE pipeline
        ms:           null,
        sb:           null,
        clipQueue:    [],
        appending:    false,
        isPaused:     false,
        isSeeking:    false,
        totalDuration:0,

        // OPFS root (set on init)
        opfsRoot:     null,
    };

    // ── OPFS init ─────────────────────────────────────────────────────────────

    async function initOPFS() {
        try {
            state.opfsRoot = await navigator.storage.getDirectory();
            console.log('[receiver] OPFS ready');
        } catch (e) {
            console.warn('[receiver] OPFS unavailable, using memory only:', e);
            state.opfsRoot = null;
        }
    }

    async function opfsWrite(seq, buffer) {
        if (!state.opfsRoot) return buffer;
        try {
            const name   = `cf_clip_${seq}.webm`;
            const handle = await state.opfsRoot.getFileHandle(name, { create: true });
            const writable = await handle.createWritable();
            await writable.write(buffer);
            await writable.close();
            return { handle, name };
        } catch (e) {
            console.warn('[receiver] OPFS write failed, using memory:', e);
            return buffer;
        }
    }

    async function opfsReadAndDelete(opfsRef) {
        if (opfsRef instanceof ArrayBuffer) return opfsRef;
        try {
            const file   = await opfsRef.handle.getFile();
            const buffer = await file.arrayBuffer();
            state.opfsRoot.removeEntry(opfsRef.name).catch(() => {});
            return buffer;
        } catch (e) {
            console.warn('[receiver] OPFS read failed:', e);
            return null;
        }
    }

    // ── MediaSource pipeline ──────────────────────────────────────────────────

    function initMSE(mimeType) {
        if (state.ms) {
            try { state.ms.endOfStream(); } catch (e) {}
            state.ms  = null;
            state.sb  = null;
        }
        state.clipQueue     = [];
        state.appending     = false;
        state.totalDuration = 0;

        const ms = new MediaSource();
        state.ms = ms;
        videoEl.src = URL.createObjectURL(ms);

        ms.addEventListener('sourceopen', () => {
            // Try the exact codec string the caster used first,
            // then fall back to plain webm if addSourceBuffer rejects it.
            const candidates = [
                mimeType || 'video/webm;codecs=vp9,opus',
                'video/webm;codecs=vp8,opus',
                'video/webm',
            ];

            let sb = null;
            for (const codec of candidates) {
                try {
                    sb = ms.addSourceBuffer(codec);
                    console.log('[receiver] addSourceBuffer OK with:', codec);
                    break;
                } catch (e) {
                    console.warn('[receiver] addSourceBuffer rejected codec:', codec, e);
                }
            }

            if (!sb) {
                console.error('[receiver] No supported codec found — cannot play');
                return;
            }

            sb.mode  = 'sequence';
            state.sb = sb;
            sb.addEventListener('updateend', onUpdateEnd);
            sb.addEventListener('error', (e) => console.error('[receiver] SB error:', e));

            // FIX 1: drain here — this is the earliest point sb is valid.
            // The drainQueue() call in handleClipEnd runs BEFORE sourceopen fires
            // on the very first clip, so without this the queue sits forever.
            drainQueue();
        }, { once: true });
    }

    function onUpdateEnd() {
        state.appending = false;
        pruneBuffer();
        updateBufferUI();
        drainQueue();
    }

    async function drainQueue() {
        if (state.appending || state.isSeeking || state.isPaused) return;
        if (!state.sb || state.sb.updating) return;
        if (state.clipQueue.length === 0) return;

        const opfsRef = state.clipQueue.shift();
        const buffer  = await opfsReadAndDelete(opfsRef);
        if (!buffer || buffer.byteLength === 0) { drainQueue(); return; }

        state.appending = true;
        try {
            state.sb.appendBuffer(buffer);
        } catch (e) {
            console.error('[receiver] appendBuffer failed:', e);
            state.appending = false;
            if (e.name === 'QuotaExceededError') {
                pruneBuffer(true);
                setTimeout(drainQueue, 100);
            }
        }
    }

    function pruneBuffer(aggressive = false) {
        if (!state.sb || state.sb.updating || !state.ms) return;
        if (state.ms.readyState !== 'open') return;
        const ct = videoEl.currentTime;
        const removeUntil = ct - (aggressive ? 5 : MAX_BUFFER_S);
        if (removeUntil <= 0) return;
        try {
            if (state.sb.buffered.length > 0 && state.sb.buffered.start(0) < removeUntil) {
                state.sb.remove(0, removeUntil);
            }
        } catch (e) { /* updating guard */ }
    }

    function updateBufferUI() {
        if (!state.sb || !state.sb.buffered.length) return;
        const ct    = videoEl.currentTime;
        const end   = state.sb.buffered.end(state.sb.buffered.length - 1);
        const ahead = Math.max(0, end - ct);
        const pct = Math.min(100, (ahead / 15) * 100);
        bufferFill.style.width = pct + '%';
        statsBadge.textContent = `buf: ${ahead.toFixed(1)}s · queue: ${state.clipQueue.length}`;
    }

    // ── Clip reassembly ───────────────────────────────────────────────────────

    function handleClipStart(msg) {
        state.incomingSeq     = msg.seq;
        state.incomingMime    = msg.mimeType;
        state.incomingSize    = msg.byteLength;
        state.incomingChunks  = [];
        state.incomingReceived = 0;
    }

    function handleChunkData(arrayBuffer) {
        if (state.incomingSeq === null) return;
        state.incomingChunks.push(arrayBuffer);
        state.incomingReceived += arrayBuffer.byteLength;
    }

    async function handleClipEnd(msg) {
        if (state.incomingSeq !== msg.seq) return;

        const total  = state.incomingChunks.reduce((n, c) => n + c.byteLength, 0);
        const merged = new Uint8Array(total);
        let offset = 0;
        for (const chunk of state.incomingChunks) {
            merged.set(new Uint8Array(chunk), offset);
            offset += chunk.byteLength;
        }
        state.incomingChunks  = [];
        state.incomingSeq     = null;

        // FIX 2: track whether this is the first clip so we know whether
        // drainQueue() is safe to call immediately.
        // On the first clip, sourceopen hasn't fired yet — state.sb is still
        // null — so calling drainQueue() here would bail immediately and the
        // clip would sit in the queue with nothing to kick it loose later.
        // We skip the immediate drain; initMSE's sourceopen handler calls it.
        const isFirstClip = !state.sb && state.ms === null;

        if (isFirstClip) {
            initMSE(state.incomingMime);
        }

        const opfsRef = await opfsWrite(msg.seq, merged.buffer);
        state.clipQueue.push(opfsRef);

        if (state.isSeeking) {
            state.isSeeking = false;
            seekSpinner.classList.remove('visible');
        }

        // Only drain if the SourceBuffer already exists.
        // If isFirstClip, the sourceopen handler will drain once sb is ready.
        if (!isFirstClip) {
            drainQueue();
        }

        updateBufferUI();
    }

    // ── Seek / pause / resume ─────────────────────────────────────────────────

    function handleSeekFlush() {
        state.isSeeking = true;
        state.clipQueue = [];
        seekSpinner.classList.add('visible');
        flashSeek(0);

        if (state.ms) {
            try { state.ms.endOfStream(); } catch (e) {}
        }
        // FIX 3: null both ms AND sb so handleClipEnd correctly detects
        // the next clip as "first clip" and reinitialises MSE.
        // Without this, if sb is still non-null from the old pipeline,
        // initMSE is never called and the new clips have nowhere to append.
        state.ms = null;
        state.sb = null;
    }

    function handlePause() {
        state.isPaused = true;
        videoEl.pause();
        flashPlayPause('⏸');
        showOverlay();
        playStateEl.textContent = '▶';
    }

    function handleResume() {
        state.isPaused = false;
        videoEl.play().catch(() => {});
        flashPlayPause('▶');
        showOverlay();
        playStateEl.textContent = '⏸';
        drainQueue();
    }

    // ── Data channel message dispatcher ──────────────────────────────────────

    function onDCMessage(ev) {
        if (ev.data instanceof ArrayBuffer) {
            handleChunkData(ev.data);
            return;
        }
        try {
            const msg = JSON.parse(ev.data);
            switch (msg.type) {
                case 'clip_start':    handleClipStart(msg);                      break;
                case 'clip_end':      handleClipEnd(msg);                        break;
                case 'pause':         handlePause();                             break;
                case 'resume':        handleResume();                            break;
                case 'seek_flush':    handleSeekFlush();                         break;
                case 'metadata':      mediaTitle.textContent = msg.title || '—'; break;
                case 'quality_changed': setQuality(msg.quality, false);          break;
            }
        } catch (e) { console.error('[receiver] dc parse error:', e); }
    }

    // ── Quality ───────────────────────────────────────────────────────────────

    function setQuality(q, notify = true) {
        state.quality = q;
        document.querySelectorAll('.q-pill, .qp-option').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.q === q);
        });
        qualityBadge.textContent = q.toUpperCase();
        if (notify) {
            sendToExtension({ type: 'setQuality', quality: q });
            showToast(`Quality → ${q}`);
        }
    }

    document.querySelectorAll('.q-pill').forEach(btn =>
        btn.addEventListener('click', () => setQuality(btn.dataset.q)));
    document.querySelectorAll('.qp-option').forEach(btn =>
        btn.addEventListener('click', () => { setQuality(btn.dataset.q); setTimeout(closeQualityPanel, 300); }));

    function openQualityPanel()  { state.qualityOpen = true;  qualityPanel.classList.add('visible'); }
    function closeQualityPanel() { state.qualityOpen = false; qualityPanel.classList.remove('visible'); }

    // ── Send to extension ─────────────────────────────────────────────────────

    function sendToExtension(data) {
        if (state.dc?.readyState === 'open') {
            state.dc.send(JSON.stringify(data));
        }
    }

    // ── WebRTC init ───────────────────────────────────────────────────────────

    async function init() {
        await initOPFS();

        state.code = sessionStorage.getItem('cf_code') || makeCode();
        sessionStorage.setItem('cf_code', state.code);
        codeEl.textContent    = state.code;
        statusMsg.textContent = 'Waiting for device…';

        await fetch(`${SIGNAL}?code=${state.code}&action=clear`, { method: 'POST' }).catch(() => {});
        pollForOffer();
    }

    function makeCode() {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
        return Array.from({ length: 4 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    }

    async function pollForOffer() {
        try {
            const res  = await fetch(`${SIGNAL}?code=${state.code}&role=receiver`);
            const data = await res.json();
            if (data.offer) {
                clearTimeout(state.pollTimer);
                statusMsg.textContent = 'Device found — connecting…';
                await handleOffer(data.offer, data.ice_caster || []);
                return;
            }
        } catch (e) { console.warn('[receiver] poll error:', e); }
        state.pollTimer = setTimeout(pollForOffer, 1500);
    }

    async function handleOffer(offer, iceCandidates) {
        if (state.pc) { state.pc.close(); state.pc = null; }

        state.pc = new RTCPeerConnection({
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
            ],
            bundlePolicy:  'max-bundle',
            rtcpMuxPolicy: 'require',
        });

        state.pc.ondatachannel = (e) => {
            state.dc            = e.channel;
            state.dc.binaryType = 'arraybuffer';
            state.dc.onopen  = () => {
                console.log('[receiver] dc open');
                sendToExtension({ type: 'ready' });
                waitingScreen.style.display = 'none';
                connectedBar.classList.add('show');
                showToast('🎬 Connected — buffering…');
            };
            state.dc.onmessage = onDCMessage;
            state.dc.onclose   = () => {
                showToast('📵 Device disconnected');
                resetConnection();
            };
        };

        const receiverCandidates = [];
        state.pc.onicecandidate = (e) => {
            if (e.candidate) receiverCandidates.push(e.candidate);
        };

        state.pc.onconnectionstatechange = () => {
            const cs = state.pc?.connectionState;
            if (cs === 'disconnected' || cs === 'failed') {
                showToast('📵 Device disconnected');
                resetConnection();
            }
        };

        await state.pc.setRemoteDescription({ type: 'offer', sdp: offer });
        for (const c of iceCandidates) await state.pc.addIceCandidate(c).catch(() => {});

        const answer = await state.pc.createAnswer();
        await state.pc.setLocalDescription(answer);
        await waitForICE(2500);

        await fetch(`${SIGNAL}?code=${state.code}&action=answer`, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ answer: state.pc.localDescription.sdp, ice: receiverCandidates }),
        });
    }

    function resetConnection() {
        connectedBar.classList.remove('show');
        waitingScreen.style.display = 'flex';
        statusMsg.textContent = 'Waiting for device…';
        state.pc = null; state.dc = null;
        state.ms = null; state.sb = null;
        state.clipQueue = [];
        videoEl.src = '';
        seekSpinner.classList.remove('visible');
        fetch(`${SIGNAL}?code=${state.code}&action=clear`, { method: 'POST' }).catch(() => {});
        pollForOffer();
    }

    function waitForICE(timeoutMs) {
        return new Promise((resolve) => {
            if (!state.pc || state.pc.iceGatheringState === 'complete') { resolve(); return; }
            const check = () => {
                if (state.pc?.iceGatheringState === 'complete') {
                    state.pc.removeEventListener('icegatheringstatechange', check);
                    resolve();
                }
            };
            state.pc.addEventListener('icegatheringstatechange', check);
            setTimeout(() => { state.pc?.removeEventListener('icegatheringstatechange', check); resolve(); }, timeoutMs);
        });
    }

    // ── Keyboard shortcuts ────────────────────────────────────────────────────

    document.addEventListener('keydown', e => {
        if (e.key === 'Shift') { document.body.classList.toggle('cursor-visible'); e.preventDefault(); return; }
        if (e.key === 'q' || e.key === 'Q') {
            state.qualityOpen ? closeQualityPanel() : (openQualityPanel(), showOverlay());
            e.preventDefault(); return;
        }
        if (e.key === 'Escape' && state.qualityOpen) { closeQualityPanel(); e.preventDefault(); return; }
        if (state.qualityOpen) return;

        switch (e.key) {
            case ' ': case 'Enter':
                if (state.isPaused) {
                    sendToExtension({ type: 'resume' });
                } else {
                    sendToExtension({ type: 'pause' });
                }
                e.preventDefault(); break;
            case 'ArrowLeft':
                sendToExtension({ type: 'seekRelative', seconds: -5 });
                flashSeek(-5); showOverlay(); e.preventDefault(); break;
            case 'ArrowRight':
                sendToExtension({ type: 'seekRelative', seconds: 5 });
                flashSeek(5); showOverlay(); e.preventDefault(); break;
            case 'ArrowUp':
                sendToExtension({ type: 'volumeUp' }); showOverlay(); e.preventDefault(); break;
            case 'ArrowDown':
                sendToExtension({ type: 'volumeDown' }); showOverlay(); e.preventDefault(); break;
        }
    });

    // ── Overlay / progress ────────────────────────────────────────────────────

    function showOverlay() {
        overlay.classList.add('visible');
        clearTimeout(state.hideTimer);
        state.hideTimer = setTimeout(() => overlay.classList.remove('visible'), 5000);
    }

    videoEl.addEventListener('timeupdate', () => {
        if (!state.sb || !state.sb.buffered.length) return;
        const end = state.sb.buffered.end(state.sb.buffered.length - 1);
        const ct  = videoEl.currentTime;
        const pct = end > 0 ? (ct / end) * 100 : 0;
        progressFill.style.width  = pct + '%';
        progressHandle.style.left = pct + '%';
        currentTimeEl.textContent = formatTime(ct);
        durationEl.textContent    = formatTime(end);
        updateBufferUI();
    });

    videoEl.addEventListener('play',  () => { playStateEl.textContent = '⏸'; });
    videoEl.addEventListener('pause', () => { playStateEl.textContent = '▶'; });

    videoEl.addEventListener('canplay', () => {
        if (!state.isPaused) {
            videoEl.play().then(() => {
                tryUnmute();
            }).catch(() => {
                unmuteBtn.style.display = 'block';
            });
        }
    });

    // ── Unmute ────────────────────────────────────────────────────────────────

    function tryUnmute() {
        videoEl.muted = false;
        videoEl.play().catch(() => { videoEl.muted = true; unmuteBtn.style.display = 'block'; });
    }

    unmuteBtn.addEventListener('click', () => {
        videoEl.muted = false;
        videoEl.play().catch(() => {});
        unmuteBtn.style.display = 'none';
    });

    // ── Flash helpers ─────────────────────────────────────────────────────────

    function flashPlayPause(icon) {
        playFlash.textContent = icon;
        playFlash.classList.add('flash');
        setTimeout(() => playFlash.classList.remove('flash'), 600);
    }

    function flashSeek(seconds) {
        if (seconds === 0) return;
        const el = seconds < 0 ? seekBack : seekFwd;
        el.textContent = seconds < 0 ? `⏪ ${Math.abs(seconds)}s` : `${seconds}s ⏩`;
        el.classList.add('flash');
        setTimeout(() => el.classList.remove('flash'), 600);
    }

    let toastTimer;
    function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function formatTime(s) {
        if (!s || isNaN(s)) return '0:00';
        const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = Math.floor(s % 60);
        if (h > 0) return `${h}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        return `${m}:${sec.toString().padStart(2,'0')}`;
    }

    init();
})();
</script>
</body>
</html>
