<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DirectCast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#0a0a0a;
  --surface:rgba(255,255,255,0.06);
  --surface-hover:rgba(255,255,255,0.1);
  --border:rgba(255,255,255,0.1);
  --text:#ffffff;
  --text-secondary:rgba(255,255,255,0.5);
  --text-dim:rgba(255,255,255,0.25);
  --accent:#e50914;
  --accent-soft:rgba(229,9,20,0.2);
  --accent-glow:rgba(229,9,20,0.4);
  --btn-focus:rgba(255,255,255,0.15);
  --radius:12px;
  --radius-lg:18px;
}

html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;font-family:'Outfit',sans-serif;-webkit-font-smoothing:antialiased;color:var(--text)}
body{cursor:none}

/* ─── Video ──────────────────────────────────────────────────────────────── */
#videoEl{position:fixed;inset:0;width:100%;height:100%;object-fit:contain;background:#000;z-index:0}

/* ─── Waiting screen ─────────────────────────────────────────────────────── */
#waitingScreen{
  position:fixed;inset:0;z-index:60;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--bg);
  transition:opacity .5s ease, visibility .5s ease;
}
#waitingScreen.hidden{opacity:0;visibility:hidden;pointer-events:none}

#waitingScreen::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 110%, rgba(229,9,20,0.12) 0%, transparent 70%);
  pointer-events:none;
}

.ws-brand{
  font-size:11px;font-weight:600;letter-spacing:6px;text-transform:uppercase;
  color:var(--text-dim);margin-bottom:48px;position:relative;z-index:1;
}

.ws-card{
  position:relative;z-index:1;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);
  border-radius:24px;
  padding:52px 72px;
  display:flex;flex-direction:column;align-items:center;
  min-width:400px;
  backdrop-filter:blur(20px);
}
.ws-card::before{
  content:'';position:absolute;inset:-1px;border-radius:25px;
  background:linear-gradient(135deg,rgba(255,255,255,0.08),transparent 50%,rgba(229,9,20,0.06));
  pointer-events:none;z-index:-1;
}

.ws-label{font-size:10px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--text-dim);margin-bottom:12px}

#codeEl{
  font-family:'JetBrains Mono',monospace;
  font-size:72px;font-weight:500;letter-spacing:12px;
  color:var(--text);line-height:1;margin-bottom:6px;
}

.ws-sublabel{font-size:12px;color:var(--text-secondary);letter-spacing:.5px;margin-bottom:32px}

.ws-sep{width:32px;height:1px;background:var(--border);margin-bottom:24px}

#statusMsg{font-size:14px;color:var(--text-secondary);letter-spacing:.3px}

.dot-pulse{display:flex;gap:6px;margin-top:16px}
.dot-pulse span{
  width:4px;height:4px;border-radius:50%;background:var(--text-dim);
  animation:dp 1.6s ease-in-out infinite;
}
.dot-pulse span:nth-child(2){animation-delay:.22s}
.dot-pulse span:nth-child(3){animation-delay:.44s}
@keyframes dp{0%,80%,100%{opacity:.2;transform:scale(.6)}40%{opacity:1;transform:scale(1)}}

/* ─── Progress bar (top) ─────────────────────────────────────────────────── */
#topBar{
  position:fixed;top:0;left:0;right:0;height:3px;z-index:40;
  background:transparent;
  transform:scaleX(0);transform-origin:left;
  transition:transform .7s cubic-bezier(.4,0,.2,1);
}
#topBar.show{
  background:var(--accent);
  transform:scaleX(1);
}

/* ─── Toast ──────────────────────────────────────────────────────────────── */
#toast{
  position:fixed;top:40px;left:50%;
  transform:translateX(-50%) translateY(-72px);
  background:rgba(15,15,15,0.95);
  backdrop-filter:blur(24px);
  border:1px solid var(--border);
  border-radius:40px;
  padding:10px 26px;
  font-size:14px;font-weight:500;
  color:var(--text);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  z-index:90;white-space:nowrap;
}
#toast.show{transform:translateX(-50%) translateY(0)}

/* ─── Stats ──────────────────────────────────────────────────────────────── */
#statsBadge{
  position:fixed;top:24px;right:32px;
  font-family:'JetBrains Mono',monospace;
  font-size:11px;color:var(--text-dim);
  z-index:30;text-align:right;line-height:1.8;
  pointer-events:none;letter-spacing:.5px;
}

/* ─── Unmute ─────────────────────────────────────────────────────────────── */
#unmuteBtn{
  position:fixed;bottom:48px;right:48px;
  background:rgba(15,15,15,.9);backdrop-filter:blur(16px);
  border:1px solid var(--border);border-radius:40px;
  color:var(--text);font-family:'Outfit',sans-serif;
  font-size:15px;font-weight:500;
  padding:14px 28px;cursor:pointer;z-index:60;display:none;
}

/* ─── Play flash ─────────────────────────────────────────────────────────── */
#playFlash{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(.5);
  width:80px;height:80px;
  background:rgba(0,0,0,.65);backdrop-filter:blur(8px);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;z-index:30;
  transition:opacity .15s ease,transform .15s ease;
}
#playFlash.flash{opacity:1;transform:translate(-50%,-50%) scale(1)}
#playFlash svg{width:32px;height:32px;fill:white;margin-left:4px}
#playFlash.pause-flash svg{margin-left:0}

/* ─── TV Overlay ─────────────────────────────────────────────────────────── */
#tvOverlay{
  position:fixed;bottom:0;left:0;right:0;z-index:20;
  padding:0 64px 52px;
  background:linear-gradient(
    transparent 0%,
    rgba(0,0,0,0.3) 20%,
    rgba(0,0,0,0.75) 55%,
    rgba(0,0,0,.97) 100%
  );
  transform:translateY(102%);
  transition:transform .35s cubic-bezier(.4,0,.2,1);
}
#tvOverlay.visible{transform:translateY(0)}

/* Title row */
.ov-title-row{
  display:flex;align-items:flex-end;justify-content:space-between;
  margin-bottom:24px;
}
#mediaTitle{
  font-size:26px;font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:70%;line-height:1.2;
}
.ov-meta{
  font-size:13px;color:var(--text-secondary);
  font-family:'JetBrains Mono',monospace;
  text-align:right;line-height:1.8;
}

/* Seek bar */
.seek-wrap{margin-bottom:20px}
.seek-times{
  display:flex;justify-content:space-between;
  font-family:'JetBrains Mono',monospace;
  font-size:13px;color:var(--text-secondary);
  margin-bottom:10px;
}

.seek-track{
  position:relative;height:4px;
  background:rgba(255,255,255,0.18);
  border-radius:2px;cursor:pointer;
}
.seek-track.focused{outline:none}
.seek-track.focused::after{
  content:'';position:absolute;inset:-6px;border-radius:8px;
  box-shadow:0 0 0 2px rgba(255,255,255,0.2);pointer-events:none;
}

#seekFill{
  height:100%;border-radius:2px;
  background:var(--text);
  width:0%;pointer-events:none;
  transition:width .25s linear;
  position:relative;
}
#seekFill::after{
  content:'';
  position:absolute;right:-8px;top:50%;
  transform:translateY(-50%) scale(0);
  width:16px;height:16px;border-radius:50%;
  background:var(--text);
  transition:transform .2s ease;
  box-shadow:0 2px 8px rgba(0,0,0,.5);
}
.seek-track.focused #seekFill::after,
#tvOverlay.visible #seekFill::after{transform:translateY(-50%) scale(1)}

/* Controls */
.controls-row{
  display:flex;align-items:center;
  gap:12px;
}

.tv-btn{
  display:flex;align-items:center;justify-content:center;
  background:var(--surface);
  border:1.5px solid rgba(255,255,255,0.08);
  border-radius:var(--radius);
  color:var(--text);
  font-family:'Outfit',sans-serif;
  font-weight:600;cursor:pointer;outline:none;
  transition:background .15s,border-color .15s,transform .1s,box-shadow .15s;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.tv-btn:active{transform:scale(.92)}

.tv-btn.focused{
  border-color:rgba(255,255,255,0.7);
  background:var(--surface-hover);
  box-shadow:0 0 0 3px rgba(255,255,255,0.12);
}

.btn-sm{width:60px;height:60px;border-radius:12px;font-size:12px}
.btn-md{width:72px;height:72px;border-radius:14px;font-size:13px}
.btn-play{
  width:88px;height:88px;border-radius:16px;
  background:var(--text);color:#000;
  border-color:transparent;
}
.btn-play svg{fill:#000}
.btn-play.focused{
  background:#fff;
  box-shadow:0 0 0 4px rgba(255,255,255,0.25), 0 8px 32px rgba(0,0,0,.5);
  border-color:transparent;
}

.spacer{flex:1}

#qualityBtn{
  font-size:12px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;color:var(--text-secondary);
  padding:0 18px;height:40px;width:auto;border-radius:40px;
  font-family:'JetBrains Mono',monospace;
}
#qualityBtn.focused{
  color:var(--text);
  border-color:rgba(255,255,255,0.5);
  background:var(--surface-hover);
}

.btn-label{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--text-secondary)}
.btn-play .btn-label,.btn-play svg{pointer-events:none}

/* ─── Quality Panel ───────────────────────────────────────────────────────── */
#qualityPanel{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(.96);
  background:rgba(12,12,12,.97);
  backdrop-filter:blur(32px);
  border:1px solid var(--border);
  border-radius:20px;
  padding:32px 40px;
  min-width:360px;
  z-index:80;
  opacity:0;pointer-events:none;
  transition:opacity .2s ease,transform .2s ease;
}
#qualityPanel.visible{opacity:1;pointer-events:all;transform:translate(-50%,-50%) scale(1)}
#qualityPanel h3{
  font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase;
  color:var(--text-secondary);margin-bottom:20px;text-align:center;
}
.qp-list{display:flex;flex-direction:column;gap:8px}
.qp-opt{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;border-radius:12px;
  border:1.5px solid rgba(255,255,255,0.07);
  background:transparent;
  color:var(--text);font-family:'Outfit',sans-serif;
  font-size:15px;cursor:pointer;outline:none;
  transition:all .15s;
}
.qp-opt.focused{
  border-color:rgba(255,255,255,.5);
  background:rgba(255,255,255,.06);
  box-shadow:0 0 0 2px rgba(255,255,255,.1);
}
.qp-opt.active{
  background:var(--text);color:#000;
  border-color:var(--text);
}
.qp-opt.active.focused{
  background:#fff;border-color:#fff;
  box-shadow:0 0 0 3px rgba(255,255,255,.2);
}
.qp-name{font-weight:700;font-size:15px}
.qp-desc{font-size:12px;opacity:.5}
.qp-opt.active .qp-desc{opacity:.45;color:#000}
.qp-hint{font-size:10px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;text-align:center;margin-top:16px}
</style>
</head>
<body>

<!-- Waiting -->
<div id="waitingScreen">
  <p class="ws-brand">DirectCast</p>
  <div class="ws-card">
    <p class="ws-label">Your code</p>
    <div id="codeEl">····</div>
    <p class="ws-sublabel">Enter this in the DirectCast extension</p>
    <div class="ws-sep"></div>
    <div id="statusMsg">Waiting for device…</div>
    <div class="dot-pulse"><span></span><span></span><span></span></div>
  </div>
</div>

<div id="topBar"></div>
<div id="toast"></div>
<div id="statsBadge"></div>

<div id="playFlash">
  <svg id="flashPlaySvg" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
</div>

<video id="videoEl" autoplay playsinline muted></video>
<button id="unmuteBtn">🔊 Press OK to enable audio</button>

<!-- TV Overlay -->
<div id="tvOverlay">
  <div class="ov-title-row">
    <div id="mediaTitle">—</div>
    <div class="ov-meta" id="ovMeta"></div>
  </div>

  <div class="seek-wrap">
    <div class="seek-times">
      <span id="currentTimeEl">0:00</span>
      <span id="durationEl">--:--</span>
    </div>
    <div class="seek-track" id="seekTrack">
      <div id="seekFill"></div>
    </div>
  </div>

  <div class="controls-row">
    <!-- -10s -->
    <button class="tv-btn btn-sm" id="skipBackBtn" title="-10s">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/>
        <text x="7" y="20.5" font-size="5.5" font-family="Outfit,sans-serif" font-weight="700" fill="currentColor" stroke="none">10</text>
      </svg>
    </button>
    <!-- -5s -->
    <button class="tv-btn btn-md" id="seekBackBtn" title="-5s">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
        <path d="M6 5.5 2 12l4 6.5V5.5z"/><rect x="8.5" y="5.5" width="10" height="13" rx="2"/>
      </svg>
    </button>
    <!-- Play/Pause -->
    <button class="tv-btn btn-play" id="playPauseBtn">
      <svg id="playIcon"  width="36" height="36" viewBox="0 0 24 24" fill="#000"><polygon points="6,3 20,12 6,21"/></svg>
      <svg id="pauseIcon" width="36" height="36" viewBox="0 0 24 24" fill="#000" style="display:none"><rect x="5" y="4" width="4" height="16" rx="1"/><rect x="15" y="4" width="4" height="16" rx="1"/></svg>
    </button>
    <!-- +5s -->
    <button class="tv-btn btn-md" id="seekFwdBtn" title="+5s">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
        <path d="M18 5.5l4 6.5-4 6.5V5.5z"/><rect x="5.5" y="5.5" width="10" height="13" rx="2"/>
      </svg>
    </button>
    <!-- +10s -->
    <button class="tv-btn btn-sm" id="skipFwdBtn" title="+10s">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-3.5"/>
        <text x="7" y="20.5" font-size="5.5" font-family="Outfit,sans-serif" font-weight="700" fill="currentColor" stroke="none">10</text>
      </svg>
    </button>

    <div class="spacer"></div>
    <button class="tv-btn btn-sm" id="qualityBtn">1080p</button>
  </div>
</div>

<!-- Quality Panel -->
<div id="qualityPanel">
  <h3>Stream Quality</h3>
  <div class="qp-list" id="qpList">
    <button class="qp-opt" data-q="720p"><span class="qp-name">720p</span><span class="qp-desc">Low bandwidth</span></button>
    <button class="qp-opt active" data-q="1080p"><span class="qp-name">1080p</span><span class="qp-desc">Recommended</span></button>
    <button class="qp-opt" data-q="1440p"><span class="qp-name">1440p</span><span class="qp-desc">High detail</span></button>
    <button class="qp-opt" data-q="4k"><span class="qp-name">4K</span><span class="qp-desc">Max quality</span></button>
  </div>
  <p class="qp-hint">↑ ↓ navigate &nbsp;·&nbsp; OK select &nbsp;·&nbsp; Back close</p>
</div>

<script>
(() => {
'use strict';

const SIGNAL = '/api/signal';
const $ = id => document.getElementById(id);

const videoEl       = $('videoEl');
const waitingScreen = $('waitingScreen');
const statusMsg     = $('statusMsg');
const codeEl        = $('codeEl');
const topBar        = $('topBar');
const toast         = $('toast');
const statsBadge    = $('statsBadge');
const playFlash     = $('playFlash');
const flashPlaySvg  = $('flashPlaySvg');
const unmuteBtn     = $('unmuteBtn');
const tvOverlay     = $('tvOverlay');
const mediaTitle    = $('mediaTitle');
const ovMeta        = $('ovMeta');
const seekTrack     = $('seekTrack');
const seekFill      = $('seekFill');
const currentTimeEl = $('currentTimeEl');
const durationEl    = $('durationEl');
const playPauseBtn  = $('playPauseBtn');
const playIcon      = $('playIcon');
const pauseIcon     = $('pauseIcon');
const seekBackBtn   = $('seekBackBtn');
const seekFwdBtn    = $('seekFwdBtn');
const skipBackBtn   = $('skipBackBtn');
const skipFwdBtn    = $('skipFwdBtn');
const qualityBtn    = $('qualityBtn');
const qualityPanel  = $('qualityPanel');
const qpList        = $('qpList');

// ── Focus model ───────────────────────────────────────────────────────────────
const CONTROLS = [skipBackBtn, seekBackBtn, playPauseBtn, seekFwdBtn, skipFwdBtn, qualityBtn];
const QP_OPTS  = Array.from(qpList.querySelectorAll('.qp-opt'));
const focus    = { mode:'controls', ctrlIdx:2, qIdx:1 };

function setCtrl(idx) {
    focus.ctrlIdx = Math.max(0, Math.min(CONTROLS.length - 1, idx));
    CONTROLS.forEach((el, i) => el.classList.toggle('focused', i === focus.ctrlIdx));
    seekTrack.classList.remove('focused');
}
function setQFocus(idx) {
    focus.qIdx = Math.max(0, Math.min(QP_OPTS.length - 1, idx));
    QP_OPTS.forEach((el, i) => el.classList.toggle('focused', i === focus.qIdx));
}
function enterSeek() {
    focus.mode = 'seekBar';
    CONTROLS.forEach(el => el.classList.remove('focused'));
    seekTrack.classList.add('focused');
}
function exitSeek() {
    focus.mode = 'controls';
    seekTrack.classList.remove('focused');
    setCtrl(focus.ctrlIdx);
}
function openQP() {
    focus.mode = 'quality';
    qualityPanel.classList.add('visible');
    const ai = QP_OPTS.findIndex(o => o.classList.contains('active'));
    setQFocus(ai >= 0 ? ai : 1);
}
function closeQP() {
    focus.mode = 'controls';
    qualityPanel.classList.remove('visible');
    setCtrl(CONTROLS.indexOf(qualityBtn));
}

// ── Playback state ─────────────────────────────────────────────────────────────
// All seek/time state is driven by the sender via 'videoState' data channel
// messages. The receiver's <video> is a raw WebRTC stream with no meaningful
// currentTime or duration of its own.
const playback = {
    currentTime: 0,
    duration:    0,
    paused:      true,
};

function updateSeekUI() {
    const { currentTime, duration } = playback;
    currentTimeEl.textContent = fmt(currentTime);
    durationEl.textContent    = (duration > 0) ? fmt(duration) : '--:--';
    if (duration > 0) {
        seekFill.style.width = ((currentTime / duration) * 100) + '%';
    } else {
        seekFill.style.width = '0%';
    }
}

function updatePlayUI(paused) {
    playIcon.style.display  = paused ? '' : 'none';
    pauseIcon.style.display = paused ? 'none' : '';
}

// ── State ─────────────────────────────────────────────────────────────────────
const state = {
    code: null, pc: null, dc: null,
    pollTimer: null, hideTimer: null,
    quality: '1080p', statsTimer: null, connected: false,
};

// ── Overlay ───────────────────────────────────────────────────────────────────
function showOverlay(resetFocus) {
    tvOverlay.classList.add('visible');
    if (resetFocus) setCtrl(2);
    resetHideTimer();
}
function resetHideTimer() {
    clearTimeout(state.hideTimer);
    state.hideTimer = setTimeout(() => {
        if (focus.mode === 'quality') return;
        tvOverlay.classList.remove('visible');
        CONTROLS.forEach(el => el.classList.remove('focused'));
        seekTrack.classList.remove('focused');
        focus.mode = 'controls';
    }, 6000);
}

// ── Autoplay ──────────────────────────────────────────────────────────────────
function attemptPlay() {
    videoEl.muted = true;
    videoEl.play().then(() => {
        videoEl.muted = false;
        videoEl.play().catch(() => { videoEl.muted = true; unmuteBtn.style.display = 'block'; });
    }).catch(e => { if (e.name !== 'AbortError') unmuteBtn.style.display = 'block'; });
}
unmuteBtn.addEventListener('click', () => {
    videoEl.muted = false; videoEl.play().catch(() => {}); unmuteBtn.style.display = 'none';
});

videoEl.addEventListener('play',  () => updatePlayUI(false));
videoEl.addEventListener('pause', () => updatePlayUI(true));

// ── Stream UI ─────────────────────────────────────────────────────────────────
function showStreamUI() {
    if (state.connected) return;
    state.connected = true;
    waitingScreen.classList.add('hidden');
    topBar.classList.add('show');
    showToast('🎬 Connected');
    startStats();
    showOverlay(true);
}

// ── Actions ───────────────────────────────────────────────────────────────────
function doPlayPause() {
    // FIX: Send 'pause' or 'resume' based on current playback state so the
    // background can handle them distinctly. Previously sent 'resume'/'pause'
    // but background only handled 'togglePlayPause'. Now both sides agree.
    if (playback.paused) {
        sendExt({ type: 'resume' });
        playback.paused = false;
        updatePlayUI(false);
        flashIcon('play');
    } else {
        sendExt({ type: 'pause' });
        playback.paused = true;
        updatePlayUI(true);
        flashIcon('pause');
    }
}

function doSeekRelative(s) {
    sendExt({ type: 'seekRelative', seconds: s });
    showToast(s > 0 ? `+${s}s ⏩` : `${s}s ⏪`);
    // Optimistically update local time so UI feels instant
    playback.currentTime = Math.max(0, Math.min(
        playback.duration > 0 ? playback.duration : Infinity,
        playback.currentTime + s
    ));
    updateSeekUI();
}

// FIX: New absolute seek function. Used when the user clicks/drags the seek
// bar to a specific position rather than nudging relative to current time.
function doSeekTo(targetTime) {
    if (playback.duration <= 0) return;
    const clamped = Math.max(0, Math.min(playback.duration, targetTime));
    sendExt({ type: 'seekTo', time: clamped });
    showToast('Seeking…');
    playback.currentTime = clamped;
    updateSeekUI();
}

function activateCtrl() {
    const el = CONTROLS[focus.ctrlIdx];
    if (el === playPauseBtn)  doPlayPause();
    else if (el === seekBackBtn)   doSeekRelative(-5);
    else if (el === seekFwdBtn)    doSeekRelative(5);
    else if (el === skipBackBtn)   doSeekRelative(-10);
    else if (el === skipFwdBtn)    doSeekRelative(10);
    else if (el === qualityBtn)    openQP();
}

// ── Seek bar click/drag ───────────────────────────────────────────────────────
// FIX: Allow clicking the seek bar track to jump to a position absolutely.
// Previously there was no mouse interaction on the seek bar at all.
let seekDragging = false;

function seekTrackPositionToTime(clientX) {
    const rect = seekTrack.getBoundingClientRect();
    const pct  = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    return pct * playback.duration;
}

seekTrack.addEventListener('mousedown', e => {
    if (playback.duration <= 0) return;
    seekDragging = true;
    const t = seekTrackPositionToTime(e.clientX);
    playback.currentTime = t;
    updateSeekUI();
    e.preventDefault();
});
document.addEventListener('mousemove', e => {
    if (!seekDragging || playback.duration <= 0) return;
    playback.currentTime = seekTrackPositionToTime(e.clientX);
    updateSeekUI();
});
document.addEventListener('mouseup', e => {
    if (!seekDragging) return;
    seekDragging = false;
    doSeekTo(seekTrackPositionToTime(e.clientX));
});

// Touch support for seek bar
seekTrack.addEventListener('touchstart', e => {
    if (playback.duration <= 0) return;
    seekDragging = true;
    playback.currentTime = seekTrackPositionToTime(e.touches[0].clientX);
    updateSeekUI();
    e.preventDefault();
}, { passive: false });
document.addEventListener('touchmove', e => {
    if (!seekDragging || playback.duration <= 0) return;
    playback.currentTime = seekTrackPositionToTime(e.touches[0].clientX);
    updateSeekUI();
}, { passive: false });
document.addEventListener('touchend', e => {
    if (!seekDragging) return;
    seekDragging = false;
    doSeekTo(playback.currentTime);
});

// ── Keyboard ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
    const k = e.key;

    if (k === 'MediaPlayPause' || k === 'MediaPlay' || k === 'MediaPause') {
        doPlayPause(); showOverlay(false); e.preventDefault(); return;
    }
    if (k === 'MediaFastForward' || k === 'MediaTrackNext') {
        doSeekRelative(10); showOverlay(false); e.preventDefault(); return;
    }
    if (k === 'MediaRewind' || k === 'MediaTrackPrevious') {
        doSeekRelative(-10); showOverlay(false); e.preventDefault(); return;
    }

    if (!tvOverlay.classList.contains('visible')) {
        if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter',' '].includes(k)) {
            showOverlay(true); e.preventDefault(); return;
        }
    }

    if (k === 'XF86Back' || k === 'GoBack' || k === 'Escape' || k === 'BrowserBack') {
        if (focus.mode === 'quality') { closeQP(); resetHideTimer(); }
        else { tvOverlay.classList.remove('visible'); clearTimeout(state.hideTimer); focus.mode = 'controls'; }
        e.preventDefault(); return;
    }

    if (focus.mode === 'quality') {
        if (k === 'ArrowDown')               { setQFocus(focus.qIdx + 1); resetHideTimer(); }
        else if (k === 'ArrowUp')            { setQFocus(focus.qIdx - 1); resetHideTimer(); }
        else if (k === 'Enter' || k === ' ') {
            const opt = QP_OPTS[focus.qIdx];
            if (opt) { setQuality(opt.dataset.q); setTimeout(closeQP, 300); }
            resetHideTimer();
        }
        e.preventDefault(); return;
    }

    if (focus.mode === 'seekBar') {
        if (k === 'ArrowLeft')               { doSeekRelative(-5); resetHideTimer(); }
        else if (k === 'ArrowRight')         { doSeekRelative(5);  resetHideTimer(); }
        else if (k === 'ArrowDown')          { exitSeek();          resetHideTimer(); }
        else if (k === 'Enter' || k === ' ') { exitSeek();          resetHideTimer(); }
        e.preventDefault(); return;
    }

    if (focus.mode === 'controls') {
        if (k === 'ArrowUp')                 { enterSeek();                          resetHideTimer(); }
        else if (k === 'ArrowLeft')          { setCtrl(focus.ctrlIdx - 1);           resetHideTimer(); }
        else if (k === 'ArrowRight')         { setCtrl(focus.ctrlIdx + 1);           resetHideTimer(); }
        else if (k === 'Enter' || k === ' ') { activateCtrl();                       resetHideTimer(); }
        e.preventDefault();
    }
});

// ── Quality ───────────────────────────────────────────────────────────────────
function setQuality(q, notify) {
    if (notify === undefined) notify = true;
    state.quality = q;
    QP_OPTS.forEach(o => o.classList.toggle('active', o.dataset.q === q));
    qualityBtn.textContent = q.toUpperCase();
    if (notify) { sendExt({ type: 'setQuality', quality: q }); showToast('Quality → ' + q); }
}

// ── Data channel ──────────────────────────────────────────────────────────────
function sendExt(data) {
    if (state.dc && state.dc.readyState === 'open') {
        state.dc.send(JSON.stringify(data));
    }
}

function onMsg(ev) {
    if (typeof ev.data !== 'string') return;
    try {
        const m = JSON.parse(ev.data);
        switch (m.type) {

            case 'metadata':
                mediaTitle.textContent = m.title || '—';
                break;

            // FIX: Primary source of truth for seek state. The sender pushes
            // this every second. We only apply it when the user isn't actively
            // dragging the seek bar (seekDragging guard).
            case 'videoState':
                if (!seekDragging) {
                    playback.currentTime = m.currentTime || 0;
                    playback.duration    = m.duration    || 0;
                    playback.paused      = !!m.paused;
                    updateSeekUI();
                    updatePlayUI(playback.paused);
                }
                if (m.title) mediaTitle.textContent = m.title;
                ovMeta.textContent = state.quality;
                break;

            // FIX: Handle pause/resume messages pushed from background when
            // another client (popup) triggers play/pause, so the receiver UI
            // stays in sync even when it didn't initiate the action.
            case 'pause':
                playback.paused = true;
                updatePlayUI(true);
                flashIcon('pause');
                showOverlay(false);
                break;

            case 'resume':
                playback.paused = false;
                updatePlayUI(false);
                flashIcon('play');
                showOverlay(false);
                break;

            case 'quality_changed':
                setQuality(m.quality, false);
                break;
        }
    } catch(e) {}
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function startStats() {
    clearInterval(state.statsTimer);
    state.statsTimer = setInterval(async () => {
        if (!state.pc || state.pc.connectionState !== 'connected') return;
        try {
            const stats = await state.pc.getStats();
            for (const r of stats.values()) {
                if (r.type === 'inbound-rtp' && r.kind === 'video') {
                    const jb = (r.jitterBufferDelay && r.jitterBufferEmittedCount)
                        ? (r.jitterBufferDelay / r.jitterBufferEmittedCount * 1000).toFixed(0) + 'ms'
                        : '-';
                    const fr = r.framesPerSecond ? r.framesPerSecond.toFixed(0) + 'fps' : '-';
                    statsBadge.textContent = jb + ' · ' + fr;
                    ovMeta.textContent     = fr + '\n' + state.quality;
                }
            }
        } catch(_) {}
    }, 1000);
}

// ── Flash ─────────────────────────────────────────────────────────────────────
function flashIcon(type) {
    playFlash.classList.remove('flash','pause-flash');
    if (type === 'play') {
        flashPlaySvg.innerHTML = '<polygon points="6,3 20,12 6,21"/>';
        playFlash.classList.remove('pause-flash');
    } else {
        flashPlaySvg.innerHTML = '<rect x="5" y="4" width="4" height="16" rx="1"/><rect x="15" y="4" width="4" height="16" rx="1"/>';
        playFlash.classList.add('pause-flash');
    }
    void playFlash.offsetWidth;
    playFlash.classList.add('flash');
    setTimeout(() => playFlash.classList.remove('flash'), 600);
}

let toastTimer;
function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2600);
}

function fmt(s) {
    if (!s || isNaN(s) || !isFinite(s)) return '0:00';
    const h   = Math.floor(s / 3600);
    const m   = Math.floor((s % 3600) / 60);
    const sec = Math.floor(s % 60);
    if (h > 0) return h + ':' + String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
    return m + ':' + String(sec).padStart(2,'0');
}

// ── WebRTC ────────────────────────────────────────────────────────────────────
async function init() {
    state.code = sessionStorage.getItem('cf_code') || makeCode();
    sessionStorage.setItem('cf_code', state.code);
    codeEl.textContent    = state.code;
    statusMsg.textContent = 'Waiting for device…';
    fetch(SIGNAL + '?code=' + state.code + '&action=clear', { method:'POST' }).catch(()=>{});
    setTimeout(poll, 300);
}

function makeCode() {
    const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
    return Array.from({length:4}, () => c[Math.floor(Math.random() * c.length)]).join('');
}

async function poll() {
    try {
        const r = await fetch(SIGNAL + '?code=' + state.code + '&role=receiver');
        const d = await r.json();
        if (d.offer) {
            clearTimeout(state.pollTimer);
            statusMsg.textContent = 'Device found — connecting…';
            await handleOffer(d.offer, d.ice_caster || []);
            return;
        }
    } catch(e) {}
    state.pollTimer = setTimeout(poll, 1500);
}

async function handleOffer(offer, ice) {
    if (state.pc) { state.pc.close(); state.pc = null; }
    state.connected = false;

    state.pc = new RTCPeerConnection({
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' }
        ],
        bundlePolicy: 'max-bundle', rtcpMuxPolicy: 'require'
    });

    const rs = new MediaStream();
    videoEl.srcObject = rs;

    state.pc.ontrack = e => {
        rs.addTrack(e.track);
        attemptPlay();
        showStreamUI();
    };

    state.pc.ondatachannel = e => {
        state.dc = e.channel;
        state.dc.binaryType = 'arraybuffer';
        state.dc.onopen    = () => {
            // FIX: On data channel open, immediately request current video state
            // from the sender so the seek bar populates right away instead of
            // waiting up to 1 second for the next push cycle.
            sendExt({ type: 'ready' });
            showStreamUI();
        };
        state.dc.onmessage = onMsg;
        state.dc.onerror   = ev => {
            const msg = ev?.error?.message || String(ev);
            if (msg.includes('Abort') || msg.includes('Close')) return;
            console.error('[receiver dc]', ev);
        };
        state.dc.onclose = () => { showToast('📵 Disconnected'); reset(); };
    };

    const rxIce = [];
    state.pc.onicecandidate = e => { if (e.candidate) rxIce.push(e.candidate); };
    state.pc.onconnectionstatechange = () => {
        const cs = state.pc?.connectionState;
        if (cs === 'connected') attemptPlay();
        if (cs === 'disconnected' || cs === 'failed') { showToast('📵 Disconnected'); reset(); }
    };

    await state.pc.setRemoteDescription({ type:'offer', sdp:offer });
    for (const c of ice) await state.pc.addIceCandidate(c).catch(()=>{});
    const ans = await state.pc.createAnswer();
    await state.pc.setLocalDescription(ans);
    await iceWait(1000);

    await fetch(SIGNAL + '?code=' + state.code + '&action=answer', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ answer: state.pc.localDescription.sdp, ice: rxIce })
    });
}

function reset() {
    clearInterval(state.statsTimer);
    state.connected      = false;
    playback.currentTime = 0;
    playback.duration    = 0;
    playback.paused      = true;
    updateSeekUI();
    updatePlayUI(true);
    topBar.classList.remove('show');
    tvOverlay.classList.remove('visible');
    waitingScreen.classList.remove('hidden');
    statusMsg.textContent = 'Waiting for device…';
    videoEl.srcObject     = null;
    if (state.pc) { state.pc.close(); state.pc = null; }
    state.dc = null;
    fetch(SIGNAL + '?code=' + state.code + '&action=clear', { method:'POST' }).catch(()=>{});
    setTimeout(poll, 300);
}

function iceWait(ms) {
    return new Promise(res => {
        if (!state.pc || state.pc.iceGatheringState === 'complete') { res(); return; }
        const chk = () => {
            if (state.pc?.iceGatheringState === 'complete') {
                state.pc.removeEventListener('icegatheringstatechange', chk);
                res();
            }
        };
        state.pc.addEventListener('icegatheringstatechange', chk);
        setTimeout(() => {
            if (state.pc) state.pc.removeEventListener('icegatheringstatechange', chk);
            res();
        }, ms);
    });
}

init();
})();
</script>
