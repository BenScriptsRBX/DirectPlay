<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CastFlow Receiver</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --white: #ffffff;
            --dim: rgba(255,255,255,0.45);
            --dimmer: rgba(255,255,255,0.15);
            --glass: rgba(255,255,255,0.06);
            --glass-border: rgba(255,255,255,0.11);
            --accent: #e8ff47;
        }

        html, body {
            width: 100%; height: 100%;
            background: #000;
            overflow: hidden;
            font-family: 'DM Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* cursor hidden by default — Shift toggles .cursor-visible on body */
        body { cursor: none; }
        body.cursor-visible { cursor: default; }

        #videoEl {
            position: fixed; inset: 0;
            width: 100%; height: 100%;
            object-fit: contain;
            background: #000;
            z-index: 0;
        }

        /* ── Waiting screen ─────────────────────────────────────────────────── */
        #waitingScreen {
            position: fixed; inset: 0;
            background: #000;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 50;
        }

        #waitingScreen::before {
            content: '';
            position: absolute; inset: 0;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 2px,
                rgba(255,255,255,0.012) 2px,
                rgba(255,255,255,0.012) 4px
            );
            pointer-events: none;
        }

        .wt-logo {
            font-size: 10px; font-weight: 600; letter-spacing: 8px;
            color: var(--dim); text-transform: uppercase; margin-bottom: 52px;
            position: relative; z-index: 1;
        }

        .wt-card {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 48px 64px;
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            min-width: 420px; position: relative; z-index: 1;
        }

        .wt-label {
            font-size: 10px; letter-spacing: 3px; color: var(--dim);
            text-transform: uppercase; margin-bottom: 8px;
        }

        #codeEl {
            font-family: 'DM Mono', monospace; font-size: 64px; font-weight: 500;
            color: var(--white); letter-spacing: 8px; line-height: 1; margin-bottom: 10px;
        }

        .wt-sublabel {
            font-size: 10px; letter-spacing: 2px; color: var(--dimmer); text-transform: uppercase;
        }

        .wt-divider { width: 1px; height: 28px; background: var(--glass-border); margin: 22px 0; }

        #statusMsg { font-size: 13px; color: var(--dim); letter-spacing: 0.5px; }

        /* Quality pills on waiting screen */
        .quality-row {
            display: flex; gap: 8px; margin-top: 20px;
        }

        .q-pill {
            font-size: 11px; font-weight: 500; letter-spacing: 1px;
            color: var(--dim); border: 1px solid var(--glass-border);
            background: transparent; border-radius: 20px;
            padding: 6px 14px; cursor: pointer;
            transition: all 0.15s ease; font-family: 'DM Sans', sans-serif;
        }
        .q-pill:hover { border-color: var(--dim); color: var(--white); }
        .q-pill.active {
            background: var(--white); color: #000; border-color: var(--white);
        }

        .wt-hint {
            font-size: 10px; letter-spacing: 1.5px; color: var(--dimmer);
            text-transform: uppercase; margin-top: 16px;
        }

        .dot-loader { display: flex; gap: 8px; margin-top: 14px; }
        .dot-loader span {
            width: 5px; height: 5px; background: var(--dimmer);
            border-radius: 50%; animation: dotPulse 1.6s ease-in-out infinite;
        }
        .dot-loader span:nth-child(2) { animation-delay: 0.25s; }
        .dot-loader span:nth-child(3) { animation-delay: 0.5s; }

        @keyframes dotPulse {
            0%,80%,100% { transform:scale(0.5); opacity:0.3; }
            40%          { transform:scale(1);   opacity:1; }
        }

        /* ── Overlay ────────────────────────────────────────────────────────── */
        #overlay {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 0 64px 52px;
            background: linear-gradient(transparent, rgba(0,0,0,0.92) 60%);
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(.4,0,.2,1);
            z-index: 20;
        }
        #overlay.visible { transform: translateY(0); }

        #mediaTitle {
            font-size: 26px; font-weight: 600; color: var(--white);
            margin-bottom: 22px; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis;
        }

        .progress-wrapper {
            position: relative; width: 100%; height: 3px;
            background: var(--dimmer); border-radius: 2px; margin-bottom: 18px;
        }

        #progressFill {
            height: 100%; background: var(--white);
            border-radius: 2px; width: 0%; transition: width 0.5s linear;
        }

        #progressHandle {
            position: absolute; top: 50%;
            transform: translate(-50%,-50%) scale(0);
            width: 14px; height: 14px; background: var(--white); border-radius: 50%;
            transition: transform 0.2s ease, left 0.5s linear;
        }
        #overlay.visible #progressHandle { transform: translate(-50%,-50%) scale(1); }

        .controls-row { display: flex; align-items: center; justify-content: space-between; }

        .time-display {
            font-family: 'DM Mono', monospace; font-size: 14px;
            color: var(--dim); min-width: 130px;
        }

        #playStateEl { font-size: 20px; color: var(--dim); }

        /* Quality badge shown in overlay bottom-right */
        #qualityBadge {
            font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
            color: var(--dimmer); text-transform: uppercase;
            min-width: 130px; text-align: right;
        }

        /* ── Quality picker panel (shown during stream via Q key) ───────────── */
        #qualityPanel {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.92);
            background: rgba(10,10,10,0.92); backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 32px 40px; z-index: 80;
            opacity: 0; pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            min-width: 320px;
        }
        #qualityPanel.visible {
            opacity: 1; pointer-events: all;
            transform: translate(-50%, -50%) scale(1);
        }

        #qualityPanel h3 {
            font-size: 11px; letter-spacing: 3px; color: var(--dim);
            text-transform: uppercase; margin-bottom: 20px; text-align: center;
        }

        .qp-options { display: flex; flex-direction: column; gap: 8px; }

        .qp-option {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 18px; border-radius: 12px;
            border: 1px solid var(--glass-border); cursor: pointer;
            background: transparent; color: var(--white);
            font-family: 'DM Sans', sans-serif; font-size: 14px;
            transition: all 0.15s ease;
        }
        .qp-option:hover { background: var(--glass); border-color: var(--dim); }
        .qp-option.active { background: var(--white); color: #000; border-color: var(--white); }
        .qp-option.active .qp-desc { color: rgba(0,0,0,0.5); }

        .qp-name { font-weight: 600; }
        .qp-desc { font-size: 12px; color: var(--dim); }

        #qualityPanel .qp-hint {
            font-size: 10px; letter-spacing: 1.5px; color: var(--dimmer);
            text-transform: uppercase; text-align: center; margin-top: 18px;
        }

        /* ── Seek / flash indicators ─────────────────────────────────────────── */
        .seek-indicator {
            position: fixed; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border); color: var(--white);
            font-size: 18px; font-weight: 600; padding: 16px 28px;
            border-radius: 14px; opacity: 0; transition: opacity 0.15s ease;
            pointer-events: none; z-index: 30;
        }
        #seekBack { left: 72px; }
        #seekFwd  { right: 72px; }
        .seek-indicator.flash { opacity: 1; }

        #playFlash {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            font-size: 64px; color: var(--white);
            opacity: 0; pointer-events: none; z-index: 30;
            transition: opacity 0.15s ease;
            text-shadow: 0 4px 32px rgba(0,0,0,0.9);
        }
        #playFlash.flash { opacity: 1; }

        /* ── Toast ──────────────────────────────────────────────────────────── */
        #toast {
            position: fixed; top: 36px; left: 50%;
            transform: translateX(-50%) translateY(-72px);
            background: rgba(15,15,15,0.9); backdrop-filter: blur(16px);
            color: var(--white); padding: 11px 26px; border-radius: 40px;
            font-size: 13px; transition: transform 0.4s cubic-bezier(.4,0,.2,1);
            z-index: 90; border: 1px solid var(--glass-border); white-space: nowrap;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }

        #connectedBar {
            position: fixed; top: 0; left: 0; right: 0; height: 2px;
            background: var(--accent); transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.6s cubic-bezier(.4,0,.2,1); z-index: 40;
        }
        #connectedBar.show { transform: scaleX(1); }

        #unmuteBtn {
            position: fixed; bottom: 40px; right: 40px;
            background: rgba(15,15,15,0.85); backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); color: var(--white);
            font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
            padding: 12px 24px; border-radius: 40px; cursor: pointer;
            z-index: 60; display: none;
        }
        #unmuteBtn:hover { background: rgba(40,40,40,0.9); }
    </style>
</head>
<body>

<div id="waitingScreen">
    <p class="wt-logo">CastFlow</p>
    <div class="wt-card">
        <p class="wt-label">Your code</p>
        <div id="codeEl">····</div>
        <p class="wt-sublabel">Enter in the CastFlow extension</p>
        <div class="wt-divider"></div>
        <div id="statusMsg">Waiting for device…</div>
        <div class="dot-loader"><span></span><span></span><span></span></div>

        <div class="wt-divider"></div>
        <p class="wt-label">Stream Quality</p>
        <div class="quality-row" id="waitingQualityRow">
            <button class="q-pill" data-q="720p">720p</button>
            <button class="q-pill active" data-q="1080p">1080p</button>
            <button class="q-pill" data-q="1440p">1440p</button>
            <button class="q-pill" data-q="4k">4K</button>
        </div>
        <p class="wt-hint">Press Q during stream to change</p>
    </div>
</div>

<div id="connectedBar"></div>
<div id="toast"></div>

<video id="videoEl" autoplay playsinline muted></video>
<button id="unmuteBtn">🔊 Tap to enable audio</button>

<div id="playFlash">▶</div>
<div class="seek-indicator" id="seekBack">⏪ 5s</div>
<div class="seek-indicator" id="seekFwd">5s ⏩</div>

<!-- Quality panel — shown during stream with Q key -->
<div id="qualityPanel">
    <h3>Stream Quality</h3>
    <div class="qp-options">
        <button class="qp-option" data-q="720p">
            <span class="qp-name">720p</span>
            <span class="qp-desc">1280 × 720 · Low bandwidth</span>
        </button>
        <button class="qp-option active" data-q="1080p">
            <span class="qp-name">1080p</span>
            <span class="qp-desc">1920 × 1080 · Recommended</span>
        </button>
        <button class="qp-option" data-q="1440p">
            <span class="qp-name">1440p</span>
            <span class="qp-desc">2560 × 1440 · High detail</span>
        </button>
        <button class="qp-option" data-q="4k">
            <span class="qp-name">4K</span>
            <span class="qp-desc">3840 × 2160 · Max quality</span>
        </button>
    </div>
    <p class="qp-hint">Press Q or Esc to close</p>
</div>

<div id="overlay">
    <div id="mediaTitle">—</div>
    <div class="progress-wrapper">
        <div id="progressFill"></div>
        <div id="progressHandle"></div>
    </div>
    <div class="controls-row">
        <span class="time-display">
            <span id="currentTimeEl">0:00</span>
            <span style="color:var(--dimmer)"> / </span>
            <span id="durationEl">0:00</span>
        </span>
        <span id="playStateEl">▶</span>
        <span id="qualityBadge">1080p</span>
    </div>
</div>

<script>
(() => {
    const SIGNAL = '/api/signal';

    // Quality presets — width/height sent to extension which restarts capture
    const QUALITY_PRESETS = {
        '720p':  { label: '720p',  width: 1280,  height: 720,  bitrate: 5_000_000  },
        '1080p': { label: '1080p', width: 1920,  height: 1080, bitrate: 10_000_000 },
        '1440p': { label: '1440p', width: 2560,  height: 1440, bitrate: 20_000_000 },
        '4k':    { label: '4K',    width: 3840,  height: 2160, bitrate: 40_000_000 },
    };

    const codeEl         = document.getElementById('codeEl');
    const statusMsg      = document.getElementById('statusMsg');
    const waitingScreen  = document.getElementById('waitingScreen');
    const videoEl        = document.getElementById('videoEl');
    const overlay        = document.getElementById('overlay');
    const mediaTitle     = document.getElementById('mediaTitle');
    const progressFill   = document.getElementById('progressFill');
    const progressHandle = document.getElementById('progressHandle');
    const currentTimeEl  = document.getElementById('currentTimeEl');
    const durationEl     = document.getElementById('durationEl');
    const playStateEl    = document.getElementById('playStateEl');
    const qualityBadge   = document.getElementById('qualityBadge');
    const playFlash      = document.getElementById('playFlash');
    const seekBack       = document.getElementById('seekBack');
    const seekFwd        = document.getElementById('seekFwd');
    const toast          = document.getElementById('toast');
    const connectedBar   = document.getElementById('connectedBar');
    const unmuteBtn      = document.getElementById('unmuteBtn');
    const qualityPanel   = document.getElementById('qualityPanel');

    const state = {
        code:           null,
        pc:             null,
        dc:             null,
        pollTimer:      null,
        hideTimer:      null,
        quality:        '1080p',
        cursorVisible:  false,
        qualityPanelOpen: false,
    };

    // ── Quality management ────────────────────────────────────────────────────

    function setQuality(q, notify = true) {
        if (!QUALITY_PRESETS[q]) return;
        state.quality = q;

        // Update all pill buttons (waiting screen)
        document.querySelectorAll('.q-pill').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.q === q);
        });
        // Update panel buttons
        document.querySelectorAll('.qp-option').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.q === q);
        });
        // Update badge in overlay
        qualityBadge.textContent = QUALITY_PRESETS[q].label;

        // Tell extension to switch quality — it will restart capture
        if (notify) {
            sendToExtension({ type: 'setQuality', quality: q, preset: QUALITY_PRESETS[q] });
            showToast(`Quality → ${QUALITY_PRESETS[q].label}`);
        }
    }

    function openQualityPanel() {
        state.qualityPanelOpen = true;
        qualityPanel.classList.add('visible');
    }

    function closeQualityPanel() {
        state.qualityPanelOpen = false;
        qualityPanel.classList.remove('visible');
    }

    // Wire quality buttons — waiting screen pills
    document.querySelectorAll('.q-pill').forEach(btn => {
        btn.addEventListener('click', () => setQuality(btn.dataset.q));
    });

    // Wire quality buttons — panel
    document.querySelectorAll('.qp-option').forEach(btn => {
        btn.addEventListener('click', () => {
            setQuality(btn.dataset.q);
            setTimeout(closeQualityPanel, 300);
        });
    });

    // ── Mouse cursor toggle ───────────────────────────────────────────────────

    function toggleCursor() {
        state.cursorVisible = !state.cursorVisible;
        document.body.classList.toggle('cursor-visible', state.cursorVisible);
        showToast(state.cursorVisible ? 'Cursor visible' : 'Cursor hidden');
    }

    // ── Jitter buffer ─────────────────────────────────────────────────────────

    function minimizeJitterBuffer() {
        if (!state.pc) return;
        state.pc.getReceivers().forEach(receiver => {
            if (receiver.track?.kind === 'video') {
                try {
                    if ('jitterBufferTarget' in receiver) receiver.jitterBufferTarget = 0;
                    if ('playoutDelayHint'   in receiver) receiver.playoutDelayHint   = 0;
                } catch (e) {}
            }
        });
    }

    // ── Drift corrector ───────────────────────────────────────────────────────

    const MAX_DRIFT = 0.3;
    function startDriftCorrector() {
        setInterval(() => {
            if (videoEl.paused || !videoEl.duration || !videoEl.buffered.length) return;
            const liveEdge = videoEl.buffered.end(videoEl.buffered.length - 1);
            const drift    = liveEdge - videoEl.currentTime;
            if (drift > MAX_DRIFT) {
                videoEl.currentTime = liveEdge - 0.05;
            }
        }, 500);
    }

    // ── Unmute ────────────────────────────────────────────────────────────────

    function tryUnmute() {
        videoEl.muted = false;
        videoEl.play().then(() => {
            unmuteBtn.style.display = 'none';
        }).catch(() => {
            videoEl.muted = true;
            videoEl.play().catch(() => {});
            unmuteBtn.style.display = 'block';
        });
    }

    unmuteBtn.addEventListener('click', () => {
        videoEl.muted = false;
        videoEl.play().catch(() => {});
        unmuteBtn.style.display = 'none';
    });

    // ── Send to extension ─────────────────────────────────────────────────────

    function sendToExtension(data) {
        if (state.dc?.readyState === 'open') {
            state.dc.send(JSON.stringify(data));
        }
    }

    // ── Init ──────────────────────────────────────────────────────────────────

    async function init() {
        state.code = sessionStorage.getItem('cf_code') || makeCode();
        sessionStorage.setItem('cf_code', state.code);
        codeEl.textContent    = state.code;
        statusMsg.textContent = 'Waiting for device…';

        await fetch(`${SIGNAL}?code=${state.code}&action=clear`, { method: 'POST' }).catch(() => {});
        pollForOffer();
        startDriftCorrector();
    }

    function makeCode() {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
        return Array.from({ length: 4 }, () =>
            chars[Math.floor(Math.random() * chars.length)]
        ).join('');
    }

    // ── Poll for offer ────────────────────────────────────────────────────────

    async function pollForOffer() {
        try {
            const res  = await fetch(`${SIGNAL}?code=${state.code}&role=receiver`);
            const data = await res.json();
            if (data.offer) {
                clearTimeout(state.pollTimer);
                statusMsg.textContent = 'Device found — connecting…';
                await handleOffer(data.offer, data.ice_caster || []);
                return;
            }
        } catch (e) { console.warn('Poll error:', e); }
        state.pollTimer = setTimeout(pollForOffer, 1500);
    }

    // ── Handle offer ──────────────────────────────────────────────────────────

    async function handleOffer(offer, iceCandidates) {
        if (state.pc) { state.pc.close(); state.pc = null; }

        state.pc = new RTCPeerConnection({
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ],
            bundlePolicy:  'max-bundle',
            rtcpMuxPolicy: 'require'
        });

        state.pc.ondatachannel = (e) => {
            state.dc = e.channel;
            state.dc.onopen    = () => {
                console.log('[receiver] dc open');
                // Send current quality preference to extension immediately
                sendToExtension({ type: 'setQuality', quality: state.quality, preset: QUALITY_PRESETS[state.quality] });
            };
            state.dc.onmessage = (ev) => {
                try { handleRemoteControl(JSON.parse(ev.data)); }
                catch (err) { console.error('[receiver] dc parse error:', err); }
            };
            state.dc.onerror = (err) => console.error('[receiver] dc error:', err);
        };

        const receiverCandidates = [];
        state.pc.onicecandidate = (e) => {
            if (e.candidate) receiverCandidates.push(e.candidate);
        };

        state.pc.ontrack = (e) => {
            const stream = e.streams?.[0];
            if (!stream) return;
            videoEl.srcObject = stream;
            minimizeJitterBuffer();
            videoEl.play().then(() => {
                setTimeout(tryUnmute, 300);
            }).catch(() => {
                unmuteBtn.style.display = 'block';
            });
            waitingScreen.style.display = 'none';
            connectedBar.classList.add('show');
            showToast('🎬 Stream started');
        };

        state.pc.onconnectionstatechange = () => {
            const cs = state.pc?.connectionState;
            if (cs === 'connected') minimizeJitterBuffer();
            if (cs === 'disconnected' || cs === 'failed') {
                showToast('📵 Device disconnected');
                connectedBar.classList.remove('show');
                waitingScreen.style.display = 'flex';
                statusMsg.textContent = 'Waiting for device…';
                videoEl.srcObject = null;
                state.pc = null; state.dc = null;
                unmuteBtn.style.display = 'none';
                closeQualityPanel();
                fetch(`${SIGNAL}?code=${state.code}&action=clear`, { method: 'POST' }).catch(() => {});
                pollForOffer();
            }
        };

        await state.pc.setRemoteDescription({ type: 'offer', sdp: offer });
        for (const c of iceCandidates) await state.pc.addIceCandidate(c).catch(() => {});
        const answer = await state.pc.createAnswer();
        await state.pc.setLocalDescription(answer);
        await waitForICE(2000);

        await fetch(`${SIGNAL}?code=${state.code}&action=answer`, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ answer: state.pc.localDescription.sdp, ice: receiverCandidates })
        });

        statusMsg.textContent = 'Connected!';
    }

    function waitForICE(timeoutMs) {
        return new Promise((resolve) => {
            if (!state.pc || state.pc.iceGatheringState === 'complete') { resolve(); return; }
            const check = () => {
                if (state.pc?.iceGatheringState === 'complete') {
                    state.pc.removeEventListener('icegatheringstatechange', check);
                    resolve();
                }
            };
            state.pc.addEventListener('icegatheringstatechange', check);
            setTimeout(() => { state.pc?.removeEventListener('icegatheringstatechange', check); resolve(); }, timeoutMs);
        });
    }

    // ── Remote control from extension ─────────────────────────────────────────

    function handleRemoteControl(msg) {
        switch (msg.type) {
            case 'togglePlayPause':
                if (videoEl.paused) { videoEl.play(); flashPlayPause('▶'); }
                else                { videoEl.pause(); flashPlayPause('⏸'); }
                showOverlay(); break;
            case 'play':   videoEl.play();  flashPlayPause('▶'); showOverlay(); break;
            case 'pause':  videoEl.pause(); flashPlayPause('⏸'); showOverlay(); break;
            case 'seek':
                videoEl.currentTime = msg.time; showOverlay(); break;
            case 'seekRelative':
                videoEl.currentTime = Math.max(0, Math.min(videoEl.duration || 0, videoEl.currentTime + msg.seconds));
                flashSeek(msg.seconds); showOverlay(); break;
            case 'volume':
                videoEl.volume = Math.max(0, Math.min(1, msg.volume)); break;
            case 'metadata':
                mediaTitle.textContent = msg.title; break;
        }
    }

    // ── Keyboard shortcuts ────────────────────────────────────────────────────

    document.addEventListener('keydown', e => {
        // Shift = toggle mouse cursor
        if (e.key === 'Shift') {
            toggleCursor();
            e.preventDefault();
            return;
        }

        // Q = toggle quality panel (only during stream)
        if (e.key === 'q' || e.key === 'Q') {
            if (waitingScreen.style.display === 'none' || !waitingScreen.style.display) {
                // stream is live
            }
            if (state.qualityPanelOpen) { closeQualityPanel(); }
            else                        { openQualityPanel(); showOverlay(); }
            e.preventDefault();
            return;
        }

        // Escape = close quality panel
        if (e.key === 'Escape') {
            if (state.qualityPanelOpen) { closeQualityPanel(); e.preventDefault(); return; }
        }

        // Don't fire playback shortcuts while quality panel is open
        if (state.qualityPanelOpen) return;

        switch (e.key) {
            case ' ': case 'Enter':
                sendToExtension({ type: 'togglePlayPause' });
                flashPlayPause(videoEl.paused ? '▶' : '⏸');
                showOverlay(); e.preventDefault(); break;
            case 'ArrowLeft':
                sendToExtension({ type: 'seekRelative', seconds: -5 });
                flashSeek(-5); showOverlay(); e.preventDefault(); break;
            case 'ArrowRight':
                sendToExtension({ type: 'seekRelative', seconds: 5 });
                flashSeek(5); showOverlay(); e.preventDefault(); break;
            case 'ArrowUp':
                sendToExtension({ type: 'volumeUp' }); showOverlay(); e.preventDefault(); break;
            case 'ArrowDown':
                sendToExtension({ type: 'volumeDown' }); showOverlay(); e.preventDefault(); break;
        }
    });

    // ── Overlay ───────────────────────────────────────────────────────────────

    function showOverlay() {
        overlay.classList.add('visible');
        clearTimeout(state.hideTimer);
        state.hideTimer = setTimeout(() => overlay.classList.remove('visible'), 5000);
    }

    videoEl.addEventListener('timeupdate', () => {
        const pct = videoEl.duration ? (videoEl.currentTime / videoEl.duration) * 100 : 0;
        progressFill.style.width  = pct + '%';
        progressHandle.style.left = pct + '%';
        currentTimeEl.textContent = formatTime(videoEl.currentTime);
        durationEl.textContent    = formatTime(videoEl.duration);
    });

    videoEl.addEventListener('play',  () => { playStateEl.textContent = '⏸'; });
    videoEl.addEventListener('pause', () => { playStateEl.textContent = '▶'; });

    function flashPlayPause(icon) {
        playFlash.textContent = icon;
        playFlash.classList.add('flash');
        setTimeout(() => playFlash.classList.remove('flash'), 600);
    }

    function flashSeek(seconds) {
        const el = seconds < 0 ? seekBack : seekFwd;
        el.textContent = seconds < 0 ? `⏪ ${Math.abs(seconds)}s` : `${seconds}s ⏩`;
        el.classList.add('flash');
        setTimeout(() => el.classList.remove('flash'), 600);
    }

    let toastTimer;
    function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function formatTime(s) {
        if (!s || isNaN(s)) return '0:00';
        const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = Math.floor(s % 60);
        if (h > 0) return `${h}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        return `${m}:${sec.toString().padStart(2,'0')}`;
    }

    init();
})();
</script>
</body>
</html>
