<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DirectCast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0a;--surface:rgba(255,255,255,0.07);--surface-hover:rgba(255,255,255,0.12);
  --border:rgba(255,255,255,0.1);--text:#ffffff;--text-secondary:rgba(255,255,255,0.5);
  --text-dim:rgba(255,255,255,0.22);--accent:#e50914;
}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Outfit',sans-serif;-webkit-font-smoothing:antialiased;color:var(--text)}
body{cursor:none}

/* ── Video fills the entire screen ── */
#videoEl{
  position:fixed;inset:0;width:100%;height:100%;
  object-fit:fill;   /* stretch to fill — no letterbox */
  background:#000;
  z-index:0;
}

/* ── Waiting ── */
#waitingScreen{position:fixed;inset:0;z-index:60;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);transition:opacity .5s ease,visibility .5s ease}
#waitingScreen.hidden{opacity:0;visibility:hidden;pointer-events:none}
#waitingScreen::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 110%,rgba(229,9,20,0.1) 0%,transparent 70%);pointer-events:none}
.ws-brand{font-size:11px;font-weight:600;letter-spacing:6px;text-transform:uppercase;color:var(--text-dim);margin-bottom:48px;position:relative;z-index:1}
.ws-card{position:relative;z-index:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:24px;padding:52px 72px;display:flex;flex-direction:column;align-items:center;min-width:400px;backdrop-filter:blur(20px)}
.ws-card::before{content:'';position:absolute;inset:-1px;border-radius:25px;background:linear-gradient(135deg,rgba(255,255,255,0.07),transparent 50%,rgba(229,9,20,0.05));pointer-events:none;z-index:-1}
.ws-label{font-size:10px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--text-dim);margin-bottom:12px}
#codeEl{font-family:'JetBrains Mono',monospace;font-size:72px;font-weight:500;letter-spacing:12px;color:var(--text);line-height:1;margin-bottom:6px}
.ws-sublabel{font-size:12px;color:var(--text-secondary);letter-spacing:.5px;margin-bottom:32px}
.ws-sep{width:32px;height:1px;background:var(--border);margin-bottom:24px}
#statusMsg{font-size:14px;color:var(--text-secondary);letter-spacing:.3px}
.dot-pulse{display:flex;gap:6px;margin-top:16px}
.dot-pulse span{width:4px;height:4px;border-radius:50%;background:var(--text-dim);animation:dp 1.6s ease-in-out infinite}
.dot-pulse span:nth-child(2){animation-delay:.22s}
.dot-pulse span:nth-child(3){animation-delay:.44s}
@keyframes dp{0%,80%,100%{opacity:.2;transform:scale(.6)}40%{opacity:1;transform:scale(1)}}

/* ── Chrome ── */
#topBar{position:fixed;top:0;left:0;right:0;height:2px;z-index:40;background:transparent;transform:scaleX(0);transform-origin:left;transition:transform .7s cubic-bezier(.4,0,.2,1)}
#topBar.show{background:var(--accent);transform:scaleX(1)}
#toast{position:fixed;top:36px;left:50%;transform:translateX(-50%) translateY(-64px);background:rgba(18,18,18,0.96);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:40px;padding:9px 24px;font-size:13px;font-weight:500;color:var(--text);transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:90;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}
#statsBadge{position:fixed;top:20px;right:28px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);z-index:30;text-align:right;line-height:1.8;pointer-events:none;letter-spacing:.5px}

/* ── Unmute overlay — fullscreen tap to unmute ── */
#unmuteOverlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(4px);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:16px;
  z-index:70;
  cursor:pointer;
}
#unmuteOverlay.visible{display:flex}
#unmuteOverlay .unmute-icon{
  width:80px;height:80px;background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.2);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}
#unmuteOverlay p{font-size:18px;font-weight:500;color:#fff;letter-spacing:.5px}
#unmuteOverlay small{font-size:13px;color:rgba(255,255,255,0.5)}

#playFlash{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.5);width:72px;height:72px;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;z-index:30;transition:opacity .15s ease,transform .15s ease}
#playFlash.flash{opacity:1;transform:translate(-50%,-50%) scale(1)}
#playFlash svg{width:28px;height:28px;fill:white;margin-left:3px}
#playFlash.pause-flash svg{margin-left:0}

/* ── Overlay — wider layout ── */
#tvOverlay{
  position:fixed;bottom:0;left:0;right:0;z-index:20;
  padding:0 0 48px;
  background:linear-gradient(transparent 0%,rgba(0,0,0,0.25) 20%,rgba(0,0,0,0.72) 55%,rgba(0,0,0,.98) 100%);
  transform:translateY(104%);transition:transform .35s cubic-bezier(.4,0,.2,1);
}
#tvOverlay.visible{transform:translateY(0)}

/* centred column — wider padding */
.ov-inner{display:flex;flex-direction:column;align-items:center;width:100%;max-width:1100px;margin:0 auto;padding:0 64px}

/* title */
.ov-title-row{display:flex;align-items:baseline;justify-content:center;gap:14px;margin-bottom:28px;width:100%}
#mediaTitle{font-size:22px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:700px;line-height:1.2;text-align:center}
#ovMeta{font-size:11px;color:var(--text-secondary);font-family:'JetBrains Mono',monospace;white-space:pre;flex-shrink:0}

/* seek */
.seek-wrap{width:100%;margin-bottom:36px}
.seek-times{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text-secondary);margin-bottom:12px}
.seek-track{
  position:relative;height:4px;
  background:rgba(255,255,255,0.18);
  border-radius:2px;cursor:pointer;
  transition:height .15s ease;
}
.seek-track:hover{height:6px}
.seek-track.focused::after{content:'';position:absolute;inset:-8px;border-radius:8px;box-shadow:0 0 0 2px rgba(255,255,255,0.18);pointer-events:none}
#seekFill{height:100%;border-radius:2px;background:var(--text);width:0%;pointer-events:none;transition:width .25s linear;position:relative}
#seekFill::after{content:'';position:absolute;right:-9px;top:50%;transform:translateY(-50%) scale(0);width:18px;height:18px;border-radius:50%;background:var(--text);transition:transform .2s ease;box-shadow:0 2px 8px rgba(0,0,0,.5)}
.seek-track:hover #seekFill::after,
#tvOverlay.visible #seekFill::after{transform:translateY(-50%) scale(1)}

/* ── Controls row — spread across full width ── */
.controls-row{
  display:flex;
  align-items:center;
  justify-content:space-between;   /* spread them out */
  width:100%;
  padding:0 8px;
  gap:0;
}

/* left cluster: skip-10, back-5 */
.ctrl-left{display:flex;align-items:center;gap:20px}
/* center: play */
.ctrl-center{display:flex;align-items:center}
/* right cluster: fwd-5, skip-10 */
.ctrl-right{display:flex;align-items:center;gap:20px}
/* gear gets pushed to the far right edge */
.ctrl-gear{display:flex;align-items:center}

.tv-btn{display:flex;align-items:center;justify-content:center;background:transparent;border:none;color:var(--text);font-family:'Outfit',sans-serif;font-weight:600;cursor:pointer;outline:none;border-radius:999px;transition:background .13s,transform .1s,box-shadow .13s;user-select:none;-webkit-tap-highlight-color:transparent;flex-shrink:0}
.tv-btn:active{transform:scale(.87)}
.tv-btn.focused{background:rgba(255,255,255,0.15);box-shadow:0 0 0 2px rgba(255,255,255,0.28)}

/* skip buttons — larger */
.btn-skip{
  width:56px;height:56px;
  color:rgba(255,255,255,0.75);
  background:rgba(255,255,255,0.05);
  border-radius:50%;
  border:1px solid rgba(255,255,255,0.08);
  transition:background .13s,color .13s,transform .1s;
}
.btn-skip:hover,.btn-skip.focused{color:var(--text);background:rgba(255,255,255,0.12)}

/* step ±5 buttons */
.btn-step{
  width:52px;height:52px;
  color:rgba(255,255,255,0.8);
  background:rgba(255,255,255,0.05);
  border-radius:50%;
  border:1px solid rgba(255,255,255,0.08);
}
.btn-step:hover,.btn-step.focused{color:var(--text);background:rgba(255,255,255,0.12)}

/* play button — large circle */
.btn-play{
  width:80px;height:80px;
  background:var(--text);color:#000;
  box-shadow:0 4px 24px rgba(0,0,0,0.5);
}
.btn-play svg{fill:#000;pointer-events:none}
.btn-play:hover{background:#e8e8e8}
.btn-play.focused{background:#fff;box-shadow:0 0 0 4px rgba(255,255,255,0.25),0 8px 32px rgba(0,0,0,.5)}

/* gear */
.btn-gear{
  width:46px;height:46px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:50%;
  color:rgba(255,255,255,0.5);
  transition:background .13s,color .13s,border-color .13s,transform .1s,box-shadow .13s;
}
.btn-gear:hover,.btn-gear.focused{background:rgba(255,255,255,0.12);color:var(--text);border-color:rgba(255,255,255,0.25)}

/* ── Quality panel ── */
#qualityPanel{
  position:fixed;bottom:148px;right:64px;
  background:rgba(12,12,12,.97);backdrop-filter:blur(32px);
  border:1px solid rgba(255,255,255,0.12);border-radius:16px;
  padding:20px 22px;min-width:210px;z-index:80;
  opacity:0;pointer-events:none;
  transition:opacity .17s ease,transform .17s ease;
  transform:translateY(10px) scale(.96);transform-origin:bottom right;
}
#qualityPanel.visible{opacity:1;pointer-events:all;transform:translateY(0) scale(1)}
#qualityPanel h3{font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);margin-bottom:14px}
.qp-list{display:flex;flex-direction:column;gap:3px}
.qp-opt{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 12px;border-radius:10px;border:1px solid transparent;background:transparent;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;cursor:pointer;outline:none;transition:all .13s;text-align:left;width:100%}
.qp-opt.focused{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.06)}
.qp-opt.active{background:rgba(255,255,255,0.09);border-color:rgba(255,255,255,.18)}
.qp-opt.active.focused{border-color:rgba(255,255,255,.45);background:rgba(255,255,255,.14)}
.qp-info{display:flex;flex-direction:column;gap:1px}
.qp-name{font-weight:600;font-size:14px}
.qp-desc{font-size:11px;color:var(--text-secondary)}
.qp-radio{width:16px;height:16px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.25);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .13s}
.qp-opt.active .qp-radio{background:var(--text);border-color:var(--text)}
.qp-opt.active .qp-radio::after{content:'';width:6px;height:6px;border-radius:50%;background:#000}
.qp-hint{font-size:10px;letter-spacing:1.5px;color:var(--text-dim);text-transform:uppercase;text-align:center;margin-top:12px}
</style>
</head>
<body>

<div id="waitingScreen">
  <p class="ws-brand">DirectCast</p>
  <div class="ws-card">
    <p class="ws-label">Your code</p>
    <div id="codeEl">····</div>
    <p class="ws-sublabel">Enter this in the DirectCast extension</p>
    <div class="ws-sep"></div>
    <div id="statusMsg">Waiting for device…</div>
    <div class="dot-pulse"><span></span><span></span><span></span></div>
  </div>
</div>

<!-- Fullscreen tap-to-unmute (works on all smart TVs / browsers) -->
<div id="unmuteOverlay">
  <div class="unmute-icon">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>
    </svg>
  </div>
  <p>Tap anywhere to enable audio</p>
  <small>Your browser requires a tap to allow sound</small>
</div>

<div id="topBar"></div>
<div id="toast"></div>
<div id="statsBadge"></div>
<div id="playFlash"><svg id="flashPlaySvg" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg></div>

<video id="videoEl" autoplay playsinline muted></video>

<div id="tvOverlay">
  <div class="ov-inner">

    <div class="ov-title-row">
      <div id="mediaTitle">—</div>
      <div id="ovMeta"></div>
    </div>

    <div class="seek-wrap">
      <div class="seek-times">
        <span id="currentTimeEl">0:00</span>
        <span id="durationEl">--:--</span>
      </div>
      <div class="seek-track" id="seekTrack">
        <div id="seekFill"></div>
      </div>
    </div>

    <div class="controls-row">

      <!-- Left: skip -10, step -5 -->
      <div class="ctrl-left">
        <button class="tv-btn btn-skip" id="skipBackBtn" title="-10s">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 .49-3.5"/>
            <text x="7.5" y="21.5" font-size="5" font-family="Outfit,sans-serif" font-weight="700" fill="currentColor" stroke="none">10</text>
          </svg>
        </button>
        <button class="tv-btn btn-step" id="seekBackBtn" title="-5s">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 5.5 2 12l4 6.5V5.5z"/>
            <rect x="8.5" y="5.5" width="10" height="13" rx="2"/>
          </svg>
        </button>
      </div>

      <!-- Center: play/pause -->
      <div class="ctrl-center">
        <button class="tv-btn btn-play" id="playPauseBtn">
          <svg id="playIcon"  width="34" height="34" viewBox="0 0 24 24" fill="#000"><polygon points="7,3 21,12 7,21"/></svg>
          <svg id="pauseIcon" width="34" height="34" viewBox="0 0 24 24" fill="#000" style="display:none">
            <rect x="5" y="4" width="4" height="16" rx="1.5"/>
            <rect x="15" y="4" width="4" height="16" rx="1.5"/>
          </svg>
        </button>
      </div>

      <!-- Right: step +5, skip +10 -->
      <div class="ctrl-right">
        <button class="tv-btn btn-step" id="seekFwdBtn" title="+5s">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path d="M18 5.5l4 6.5-4 6.5V5.5z"/>
            <rect x="5.5" y="5.5" width="10" height="13" rx="2"/>
          </svg>
        </button>
        <button class="tv-btn btn-skip" id="skipFwdBtn" title="+10s">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-.49-3.5"/>
            <text x="7.5" y="21.5" font-size="5" font-family="Outfit,sans-serif" font-weight="700" fill="currentColor" stroke="none">10</text>
          </svg>
        </button>
      </div>

      <!-- Gear — rightmost -->
      <div class="ctrl-gear">
        <button class="tv-btn btn-gear" id="qualityBtn" title="Quality">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>

    </div>
  </div>
</div>

<!-- Quality panel -->
<div id="qualityPanel">
  <h3>Stream Quality</h3>
  <div class="qp-list" id="qpList">
    <button class="qp-opt" data-q="720p">
      <div class="qp-info"><div class="qp-name">720p</div><div class="qp-desc">Low bandwidth</div></div>
      <div class="qp-radio"></div>
    </button>
    <button class="qp-opt active" data-q="1080p">
      <div class="qp-info"><div class="qp-name">1080p</div><div class="qp-desc">Recommended</div></div>
      <div class="qp-radio"></div>
    </button>
    <button class="qp-opt" data-q="1440p">
      <div class="qp-info"><div class="qp-name">1440p</div><div class="qp-desc">High detail</div></div>
      <div class="qp-radio"></div>
    </button>
    <button class="qp-opt" data-q="4k">
      <div class="qp-info"><div class="qp-name">4K</div><div class="qp-desc">Max quality</div></div>
      <div class="qp-radio"></div>
    </button>
  </div>
  <p class="qp-hint">↑ ↓ navigate &nbsp;·&nbsp; OK select &nbsp;·&nbsp; Back close</p>
</div>

<script>
(() => {
'use strict';
const SIGNAL = '/api/signal';
const $ = id => document.getElementById(id);

const videoEl=      $('videoEl'),
      waitingScreen=$('waitingScreen'),
      statusMsg=    $('statusMsg'),
      codeEl=       $('codeEl'),
      unmuteOverlay=$('unmuteOverlay'),
      topBar=       $('topBar'),
      toast=        $('toast'),
      statsBadge=   $('statsBadge'),
      playFlash=    $('playFlash'),
      flashPlaySvg= $('flashPlaySvg'),
      tvOverlay=    $('tvOverlay'),
      mediaTitle=   $('mediaTitle'),
      ovMeta=       $('ovMeta'),
      seekTrack=    $('seekTrack'),
      seekFill=     $('seekFill'),
      currentTimeEl=$('currentTimeEl'),
      durationEl=   $('durationEl'),
      playPauseBtn= $('playPauseBtn'),
      playIcon=     $('playIcon'),
      pauseIcon=    $('pauseIcon'),
      seekBackBtn=  $('seekBackBtn'),
      seekFwdBtn=   $('seekFwdBtn'),
      skipBackBtn=  $('skipBackBtn'),
      skipFwdBtn=   $('skipFwdBtn'),
      qualityBtn=   $('qualityBtn'),
      qualityPanel= $('qualityPanel'),
      qpList=       $('qpList');

const CONTROLS = [skipBackBtn, seekBackBtn, playPauseBtn, seekFwdBtn, skipFwdBtn, qualityBtn];
const QP_OPTS  = Array.from(qpList.querySelectorAll('.qp-opt'));
const focus    = { mode:'controls', ctrlIdx:2, qIdx:1 };

function setCtrl(idx){
    focus.ctrlIdx=Math.max(0,Math.min(CONTROLS.length-1,idx));
    CONTROLS.forEach((el,i)=>el.classList.toggle('focused',i===focus.ctrlIdx));
    seekTrack.classList.remove('focused');
}
function setQFocus(idx){ focus.qIdx=Math.max(0,Math.min(QP_OPTS.length-1,idx)); QP_OPTS.forEach((el,i)=>el.classList.toggle('focused',i===focus.qIdx)); }
function enterSeek(){ focus.mode='seekBar'; CONTROLS.forEach(el=>el.classList.remove('focused')); seekTrack.classList.add('focused'); }
function exitSeek(){ focus.mode='controls'; seekTrack.classList.remove('focused'); setCtrl(focus.ctrlIdx); }
function openQP(){ focus.mode='quality'; qualityPanel.classList.add('visible'); const ai=QP_OPTS.findIndex(o=>o.classList.contains('active')); setQFocus(ai>=0?ai:1); }
function closeQP(){ focus.mode='controls'; qualityPanel.classList.remove('visible'); setCtrl(CONTROLS.indexOf(qualityBtn)); }

const playback = { currentTime:0, duration:0, paused:true };

function updateSeekUI(){
    currentTimeEl.textContent=fmt(playback.currentTime);
    durationEl.textContent=playback.duration>0?fmt(playback.duration):'--:--';
    seekFill.style.width=playback.duration>0?((playback.currentTime/playback.duration)*100)+'%':'0%';
}
function updatePlayUI(paused){
    playIcon.style.display=paused?'':'none';
    pauseIcon.style.display=paused?'none':'';
}

const state = { code:null, pc:null, dc:null, pollTimer:null, hideTimer:null, quality:'1080p', statsTimer:null, connected:false };

function showOverlay(resetFocus){
    tvOverlay.classList.add('visible');
    if(resetFocus) setCtrl(2);
    resetHideTimer();
}
function resetHideTimer(){
    clearTimeout(state.hideTimer);
    state.hideTimer=setTimeout(()=>{
        if(focus.mode==='quality') return;
        tvOverlay.classList.remove('visible');
        CONTROLS.forEach(el=>el.classList.remove('focused'));
        seekTrack.classList.remove('focused');
        focus.mode='controls';
    }, 6000);
}

// ── Robust autoplay with fullscreen-tap unmute fallback ──────────────────────
// Strategy:
//   1. Try muted autoplay (always works).
//   2. Immediately try to unmute — succeeds if the user has previously
//      interacted with the page or the browser policy allows it.
//   3. If unmuting throws NotAllowedError, show the tap-to-unmute overlay.
//      Any tap/click on the overlay (or anywhere) will resume with audio.

function attemptPlay(){
    videoEl.muted = true;
    videoEl.play()
        .then(() => tryUnmute())
        .catch(err => {
            // Autoplay entirely blocked (rare — means the tab was never visible)
            if(err.name !== 'AbortError'){
                unmuteOverlay.classList.add('visible');
            }
        });
}

function tryUnmute(){
    videoEl.muted = false;
    // play() must be called again after un-muting to actually deliver audio
    videoEl.play()
        .then(() => {
            unmuteOverlay.classList.remove('visible');
        })
        .catch(err => {
            // NotAllowedError — browser needs a user gesture
            videoEl.muted = true;
            if(err.name === 'NotAllowedError'){
                unmuteOverlay.classList.add('visible');
            }
        });
}

// Any interaction dismisses the overlay and enables audio
function handleUserGesture(){
    if(!unmuteOverlay.classList.contains('visible')) return;
    unmuteOverlay.classList.remove('visible');
    videoEl.muted = false;
    videoEl.play().catch(()=>{});
}
unmuteOverlay.addEventListener('click', handleUserGesture);
document.addEventListener('keydown', handleUserGesture, { once: false });

videoEl.addEventListener('play',  ()=>updatePlayUI(false));
videoEl.addEventListener('pause', ()=>updatePlayUI(true));

function showStreamUI(){
    if(state.connected) return;
    state.connected = true;
    waitingScreen.classList.add('hidden');
    topBar.classList.add('show');
    showToast('Connected');
    startStats();
    showOverlay(true);
}

// ── Playback commands ────────────────────────────────────────────────────────
function doPlayPause(){
    if(playback.paused){
        sendExt({type:'resume'});
        playback.paused=false;
        updatePlayUI(false);
        flashIcon('play');
    } else {
        sendExt({type:'pause'});
        playback.paused=true;
        updatePlayUI(true);
        flashIcon('pause');
    }
}
function doSeekRelative(s){
    sendExt({type:'seekRelative', seconds:s});
    showToast(s>0?`+${s}s`:`${s}s`);
    playback.currentTime=Math.max(0, Math.min(playback.duration>0?playback.duration:Infinity, playback.currentTime+s));
    updateSeekUI();
}
function doSeekTo(t){
    if(playback.duration<=0) return;
    const c=Math.max(0, Math.min(playback.duration, t));
    sendExt({type:'seekTo', time:c});
    showToast('Seeking…');
    playback.currentTime=c;
    updateSeekUI();
}

function activateCtrl(){
    const el=CONTROLS[focus.ctrlIdx];
    if(el===playPauseBtn)      doPlayPause();
    else if(el===seekBackBtn)  doSeekRelative(-5);
    else if(el===seekFwdBtn)   doSeekRelative(5);
    else if(el===skipBackBtn)  doSeekRelative(-10);
    else if(el===skipFwdBtn)   doSeekRelative(10);
    else if(el===qualityBtn)   openQP();
}

// ── Button click handlers ────────────────────────────────────────────────────
playPauseBtn.addEventListener('click', ()=>{ doPlayPause(); showOverlay(false); });
seekBackBtn.addEventListener('click',  ()=>{ doSeekRelative(-5);  showOverlay(false); });
seekFwdBtn.addEventListener('click',   ()=>{ doSeekRelative(5);   showOverlay(false); });
skipBackBtn.addEventListener('click',  ()=>{ doSeekRelative(-10); showOverlay(false); });
skipFwdBtn.addEventListener('click',   ()=>{ doSeekRelative(10);  showOverlay(false); });
qualityBtn.addEventListener('click',   ()=>{ openQP(); });

// ── Seek bar — mouse & touch ──────────────────────────────────────────────────
let seekDragging=false;
function seekPosToTime(cx){
    const r=seekTrack.getBoundingClientRect();
    return Math.max(0, Math.min(1,(cx-r.left)/r.width)) * playback.duration;
}
seekTrack.addEventListener('mousedown', e=>{
    if(playback.duration<=0) return;
    seekDragging=true;
    playback.currentTime=seekPosToTime(e.clientX);
    updateSeekUI();
    e.preventDefault();
});
document.addEventListener('mousemove', e=>{
    if(!seekDragging||playback.duration<=0) return;
    playback.currentTime=seekPosToTime(e.clientX);
    updateSeekUI();
});
document.addEventListener('mouseup', e=>{
    if(!seekDragging) return;
    seekDragging=false;
    doSeekTo(seekPosToTime(e.clientX));
});
seekTrack.addEventListener('touchstart', e=>{
    if(playback.duration<=0) return;
    seekDragging=true;
    playback.currentTime=seekPosToTime(e.touches[0].clientX);
    updateSeekUI();
    e.preventDefault();
},{passive:false});
document.addEventListener('touchmove', e=>{
    if(!seekDragging||playback.duration<=0) return;
    playback.currentTime=seekPosToTime(e.touches[0].clientX);
    updateSeekUI();
},{passive:false});
document.addEventListener('touchend', ()=>{
    if(!seekDragging) return;
    seekDragging=false;
    doSeekTo(playback.currentTime);
});

// ── Keyboard / remote ────────────────────────────────────────────────────────
document.addEventListener('keydown', e=>{
    const k=e.key;
    if(k==='MediaPlayPause'||k==='MediaPlay'||k==='MediaPause'){ doPlayPause(); showOverlay(false); e.preventDefault(); return; }
    if(k==='MediaFastForward'||k==='MediaTrackNext'){   doSeekRelative(10);  showOverlay(false); e.preventDefault(); return; }
    if(k==='MediaRewind'||k==='MediaTrackPrevious'){    doSeekRelative(-10); showOverlay(false); e.preventDefault(); return; }

    if(!tvOverlay.classList.contains('visible')){
        if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter',' '].includes(k)){
            showOverlay(true); e.preventDefault(); return;
        }
    }
    if(k==='XF86Back'||k==='GoBack'||k==='Escape'||k==='BrowserBack'){
        if(focus.mode==='quality'){ closeQP(); resetHideTimer(); }
        else { tvOverlay.classList.remove('visible'); clearTimeout(state.hideTimer); focus.mode='controls'; }
        e.preventDefault(); return;
    }
    if(focus.mode==='quality'){
        if(k==='ArrowDown')   setQFocus(focus.qIdx+1);
        else if(k==='ArrowUp') setQFocus(focus.qIdx-1);
        else if(k==='Enter'||k===' '){ const o=QP_OPTS[focus.qIdx]; if(o){ setQuality(o.dataset.q); setTimeout(closeQP,300); } }
        resetHideTimer(); e.preventDefault(); return;
    }
    if(focus.mode==='seekBar'){
        if(k==='ArrowLeft')        doSeekRelative(-5);
        else if(k==='ArrowRight')  doSeekRelative(5);
        else if(k==='ArrowDown')   exitSeek();
        else if(k==='Enter'||k===' ') exitSeek();
        resetHideTimer(); e.preventDefault(); return;
    }
    if(focus.mode==='controls'){
        if(k==='ArrowUp')              enterSeek();
        else if(k==='ArrowLeft')       setCtrl(focus.ctrlIdx-1);
        else if(k==='ArrowRight')      setCtrl(focus.ctrlIdx+1);
        else if(k==='Enter'||k===' ')  activateCtrl();
        resetHideTimer(); e.preventDefault();
    }
});

function setQuality(q, notify){
    if(notify===undefined) notify=true;
    state.quality=q;
    QP_OPTS.forEach(o=>o.classList.toggle('active', o.dataset.q===q));
    if(notify){ sendExt({type:'setQuality', quality:q}); showToast('Quality → '+q); }
}

// ── Data channel ─────────────────────────────────────────────────────────────
function sendExt(data){
    if(state.dc && state.dc.readyState==='open') state.dc.send(JSON.stringify(data));
}

function onMsg(ev){
    if(typeof ev.data !== 'string') return;
    let m;
    try { m=JSON.parse(ev.data); } catch(e){ return; }

    switch(m.type){
        case 'metadata':
            if(m.title) mediaTitle.textContent=m.title;
            break;
        case 'videoState':
            if(!seekDragging){
                playback.currentTime = m.currentTime || 0;
                playback.duration    = m.duration    || 0;
                playback.paused      = !!m.paused;
                updateSeekUI();
                updatePlayUI(playback.paused);
            }
            if(m.title) mediaTitle.textContent=m.title;
            ovMeta.textContent=state.quality;
            break;
        case 'pause':
            playback.paused=true;
            updatePlayUI(true);
            flashIcon('pause');
            showOverlay(false);
            break;
        case 'resume':
            playback.paused=false;
            updatePlayUI(false);
            flashIcon('play');
            showOverlay(false);
            break;
        case 'quality_changed':
            setQuality(m.quality, false);
            break;
    }
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function startStats(){
    clearInterval(state.statsTimer);
    state.statsTimer=setInterval(async()=>{
        if(!state.pc||state.pc.connectionState!=='connected') return;
        try{
            const stats=await state.pc.getStats();
            for(const r of stats.values()){
                if(r.type==='inbound-rtp'&&r.kind==='video'){
                    const jb=(r.jitterBufferDelay&&r.jitterBufferEmittedCount)?(r.jitterBufferDelay/r.jitterBufferEmittedCount*1000).toFixed(0)+'ms':'-';
                    const fr=r.framesPerSecond?r.framesPerSecond.toFixed(0)+'fps':'-';
                    statsBadge.textContent=jb+' · '+fr;
                    ovMeta.textContent=fr+'  '+state.quality;
                }
            }
        }catch(_){}
    },1000);
}

// ── Flash icon ────────────────────────────────────────────────────────────────
function flashIcon(type){
    playFlash.classList.remove('flash','pause-flash');
    if(type==='play'){
        flashPlaySvg.innerHTML='<polygon points="6,3 20,12 6,21"/>';
        playFlash.classList.remove('pause-flash');
    } else {
        flashPlaySvg.innerHTML='<rect x="5" y="4" width="4" height="16" rx="1"/><rect x="15" y="4" width="4" height="16" rx="1"/>';
        playFlash.classList.add('pause-flash');
    }
    void playFlash.offsetWidth;
    playFlash.classList.add('flash');
    setTimeout(()=>playFlash.classList.remove('flash'),600);
}

let toastTimer;
function showToast(msg){
    toast.textContent=msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>toast.classList.remove('show'),2400);
}

function fmt(s){
    if(!s||isNaN(s)||!isFinite(s)) return '0:00';
    const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=Math.floor(s%60);
    if(h>0) return h+':'+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
    return m+':'+String(sec).padStart(2,'0');
}

// ── WebRTC signalling ─────────────────────────────────────────────────────────
async function init(){
    state.code = sessionStorage.getItem('cf_code') || makeCode();
    sessionStorage.setItem('cf_code', state.code);
    codeEl.textContent  = state.code;
    statusMsg.textContent = 'Waiting for device…';
    fetch(SIGNAL+'?code='+state.code+'&action=clear', {method:'POST'}).catch(()=>{});
    setTimeout(poll, 300);
}

function makeCode(){
    const c='ABCDEFGHJKLMNPQRSTUVWXYZ';
    return Array.from({length:4},()=>c[Math.floor(Math.random()*c.length)]).join('');
}

async function poll(){
    try{
        const r=await fetch(SIGNAL+'?code='+state.code+'&role=receiver');
        const d=await r.json();
        if(d.offer){
            clearTimeout(state.pollTimer);
            statusMsg.textContent='Device found — connecting…';
            await handleOffer(d.offer, d.ice_caster||[]);
            return;
        }
    }catch(e){}
    state.pollTimer=setTimeout(poll, 1500);
}

async function handleOffer(offer, ice){
    if(state.pc){ state.pc.close(); state.pc=null; }
    state.connected=false;

    state.pc=new RTCPeerConnection({
        iceServers:[
            {urls:'stun:stun.l.google.com:19302'},
            {urls:'stun:stun1.l.google.com:19302'}
        ],
        bundlePolicy:'max-bundle',
        rtcpMuxPolicy:'require'
    });

    const rs=new MediaStream();
    videoEl.srcObject=rs;

    state.pc.ontrack=e=>{
        rs.addTrack(e.track);
        // Kick off play as soon as we have at least one track
        attemptPlay();
        showStreamUI();
    };

    state.pc.ondatachannel=e=>{
        state.dc=e.channel;
        state.dc.binaryType='arraybuffer';
        state.dc.onopen=()=>{
            sendExt({type:'ready'});
            showStreamUI();
        };
        state.dc.onmessage=onMsg;
        state.dc.onerror=ev=>{
            const msg=ev?.error?.message||String(ev);
            if(msg.includes('Abort')||msg.includes('Close')) return;
            console.error('[receiver dc]', ev);
        };
        state.dc.onclose=()=>{ showToast('Disconnected'); reset(); };
    };

    const rxIce=[];
    state.pc.onicecandidate=e=>{ if(e.candidate) rxIce.push(e.candidate); };

    state.pc.onconnectionstatechange=()=>{
        const cs=state.pc?.connectionState;
        if(cs==='connected') attemptPlay();
        if(cs==='disconnected'||cs==='failed'){ showToast('Disconnected'); reset(); }
    };

    await state.pc.setRemoteDescription({type:'offer', sdp:offer});
    for(const c of ice) await state.pc.addIceCandidate(c).catch(()=>{});
    const ans=await state.pc.createAnswer();
    await state.pc.setLocalDescription(ans);
    await iceWait(1000);

    const rxIceCandidates=[];
    state.pc.onicecandidate=e=>{ if(e.candidate) rxIceCandidates.push(e.candidate); };

    await fetch(SIGNAL+'?code='+state.code+'&action=answer',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({answer:state.pc.localDescription.sdp, ice:rxIce})
    });
}

function reset(){
    clearInterval(state.statsTimer);
    state.connected=false;
    playback.currentTime=0; playback.duration=0; playback.paused=true;
    updateSeekUI(); updatePlayUI(true);
    topBar.classList.remove('show');
    tvOverlay.classList.remove('visible');
    waitingScreen.classList.remove('hidden');
    statusMsg.textContent='Waiting for device…';
    videoEl.srcObject=null;
    unmuteOverlay.classList.remove('visible');
    if(state.pc){ state.pc.close(); state.pc=null; }
    state.dc=null;
    fetch(SIGNAL+'?code='+state.code+'&action=clear',{method:'POST'}).catch(()=>{});
    setTimeout(poll, 300);
}

function iceWait(ms){
    return new Promise(res=>{
        if(!state.pc||state.pc.iceGatheringState==='complete'){ res(); return; }
        const chk=()=>{ if(state.pc?.iceGatheringState==='complete'){ state.pc.removeEventListener('icegatheringstatechange',chk); res(); } };
        state.pc.addEventListener('icegatheringstatechange',chk);
        setTimeout(()=>{ if(state.pc) state.pc.removeEventListener('icegatheringstatechange',chk); res(); }, ms);
    });
}

init();
})();
</script>
