<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CastFlow Receiver</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --white: #ffffff;
            --dim: rgba(255,255,255,0.45);
            --dimmer: rgba(255,255,255,0.15);
            --glass: rgba(255,255,255,0.06);
            --glass-border: rgba(255,255,255,0.11);
            --accent: #e8ff47;
            --red: #ff5c5c;
        }

        html, body {
            width: 100%; height: 100%;
            background: #000;
            overflow: hidden;
            font-family: 'DM Sans', sans-serif;
            cursor: none;
            -webkit-font-smoothing: antialiased;
        }

        #videoEl {
            position: fixed; inset: 0;
            width: 100%; height: 100%;
            object-fit: contain;
            background: #000;
            display: block;
            z-index: 0;
        }

        /* ── Waiting Screen ── */
        #waitingScreen {
            position: fixed; inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        #waitingScreen::before {
            content: '';
            position: absolute; inset: 0;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 2px,
                rgba(255,255,255,0.012) 2px,
                rgba(255,255,255,0.012) 4px
            );
            pointer-events: none;
        }

        .wt-logo {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 8px;
            color: var(--dim);
            text-transform: uppercase;
            margin-bottom: 52px;
            position: relative; z-index: 1;
        }

        .wt-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 48px 64px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            min-width: 400px;
            position: relative; z-index: 1;
        }

        .wt-label {
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--dim);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        #peerId {
            font-family: 'DM Mono', monospace;
            font-size: 52px;
            font-weight: 500;
            color: var(--white);
            letter-spacing: 4px;
            line-height: 1;
            margin-bottom: 10px;
            text-align: center;
        }

        .wt-sublabel {
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--dimmer);
            text-transform: uppercase;
        }

        .wt-divider {
            width: 1px; height: 28px;
            background: var(--glass-border);
            margin: 22px 0;
        }

        #statusMsg {
            font-size: 13px;
            color: var(--dim);
            letter-spacing: 0.5px;
        }

        .dot-loader {
            display: flex; gap: 8px;
            margin-top: 14px;
        }

        .dot-loader span {
            width: 5px; height: 5px;
            background: var(--dimmer);
            border-radius: 50%;
            animation: dotPulse 1.6s ease-in-out infinite;
        }
        .dot-loader span:nth-child(2) { animation-delay: 0.25s; }
        .dot-loader span:nth-child(3) { animation-delay: 0.5s; }

        @keyframes dotPulse {
            0%,80%,100% { transform:scale(0.5); opacity:0.3; }
            40% { transform:scale(1); opacity:1; }
        }

        /* ── Playback Overlay ── */
        #overlay {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            padding: 0 64px 52px;
            background: linear-gradient(transparent, rgba(0,0,0,0.92) 60%);
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(.4,0,.2,1);
            z-index: 20;
        }

        #overlay.visible { transform: translateY(0); }

        #mediaTitle {
            font-size: 26px;
            font-weight: 600;
            color: var(--white);
            margin-bottom: 22px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: -0.3px;
        }

        .progress-wrapper {
            position: relative;
            width: 100%; height: 3px;
            background: var(--dimmer);
            border-radius: 2px;
            margin-bottom: 18px;
        }

        #progressFill {
            height: 100%;
            background: var(--white);
            border-radius: 2px;
            width: 0%;
            transition: width 0.5s linear;
        }

        #progressHandle {
            position: absolute; top: 50%;
            transform: translate(-50%,-50%) scale(0);
            width: 14px; height: 14px;
            background: var(--white);
            border-radius: 50%;
            transition: transform 0.2s ease, left 0.5s linear;
            box-shadow: 0 0 8px rgba(255,255,255,0.5);
        }

        #overlay.visible #progressHandle { transform: translate(-50%,-50%) scale(1); }

        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .time-display {
            font-family: 'DM Mono', monospace;
            font-size: 14px;
            color: var(--dim);
            min-width: 130px;
            letter-spacing: 0.5px;
        }

        #playStateEl { font-size: 20px; color: var(--dim); }

        /* ── Seek flash ── */
        .seek-indicator {
            position: fixed; top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            color: var(--white);
            font-size: 18px; font-weight: 600;
            padding: 16px 28px;
            border-radius: 14px;
            opacity: 0;
            transition: opacity 0.15s ease;
            pointer-events: none; z-index: 30;
        }

        #seekBack { left: 72px; }
        #seekFwd  { right: 72px; }
        .seek-indicator.flash { opacity: 1; }

        #playFlash {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            font-size: 64px; color: var(--white);
            opacity: 0; pointer-events: none; z-index: 30;
            transition: opacity 0.15s ease;
            text-shadow: 0 4px 32px rgba(0,0,0,0.9);
        }
        #playFlash.flash { opacity: 1; }

        /* ── Toast ── */
        #toast {
            position: fixed; top: 36px; left: 50%;
            transform: translateX(-50%) translateY(-72px);
            background: rgba(15,15,15,0.9);
            backdrop-filter: blur(16px);
            color: var(--white);
            padding: 11px 26px;
            border-radius: 40px;
            font-size: 13px;
            transition: transform 0.4s cubic-bezier(.4,0,.2,1);
            z-index: 70;
            border: 1px solid var(--glass-border);
            white-space: nowrap;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }

        #connectedBar {
            position: fixed; top: 0; left: 0; right: 0;
            height: 2px;
            background: var(--accent);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.6s cubic-bezier(.4,0,.2,1);
            z-index: 40;
        }
        #connectedBar.show { transform: scaleX(1); }
    </style>
</head>
<body>

    <div id="waitingScreen">
        <p class="wt-logo">CastFlow</p>
        <div class="wt-card">
            <p class="wt-label">Your code</p>
            <div id="peerId">····</div>
            <p class="wt-sublabel">Enter in the CastFlow extension</p>
            <div class="wt-divider"></div>
            <div id="statusMsg">Connecting…</div>
            <div class="dot-loader"><span></span><span></span><span></span></div>
        </div>
    </div>

    <div id="connectedBar"></div>
    <div id="toast"></div>
    <video id="videoEl" autoplay playsinline></video>
    <div id="playFlash">▶</div>
    <div class="seek-indicator" id="seekBack">⏪ 5s</div>
    <div class="seek-indicator" id="seekFwd">5s ⏩</div>

    <div id="overlay">
        <div id="mediaTitle">—</div>
        <div class="progress-wrapper">
            <div id="progressFill"></div>
            <div id="progressHandle"></div>
        </div>
        <div class="controls-row">
            <span class="time-display">
                <span id="currentTimeEl">0:00</span>
                <span style="color:var(--dimmer)"> / </span>
                <span id="durationEl">0:00</span>
            </span>
            <span id="playStateEl">▶</span>
            <span style="min-width:130px;"></span>
        </div>
    </div>

    <script>
    (() => {
        const peerIdEl      = document.getElementById('peerId');
        const statusMsg     = document.getElementById('statusMsg');
        const waitingScreen = document.getElementById('waitingScreen');
        const videoEl       = document.getElementById('videoEl');
        const overlay       = document.getElementById('overlay');
        const mediaTitle    = document.getElementById('mediaTitle');
        const progressFill  = document.getElementById('progressFill');
        const progressHandle= document.getElementById('progressHandle');
        const currentTimeEl = document.getElementById('currentTimeEl');
        const durationEl    = document.getElementById('durationEl');
        const playStateEl   = document.getElementById('playStateEl');
        const playFlash     = document.getElementById('playFlash');
        const seekBack      = document.getElementById('seekBack');
        const seekFwd       = document.getElementById('seekFwd');
        const toast         = document.getElementById('toast');
        const connectedBar  = document.getElementById('connectedBar');

        const state = { hideTimer: null, overlayVisible: false };

        // ── PEERJS ────────────────────────────────────────────────────────────
        // Generate a short memorable 4-char code, stable per browser session
        function getOrCreateCode() {
            let code = sessionStorage.getItem('cf_peer_id');
            if (!code) {
                // 4 uppercase letters, easy to type
                code = Array.from({ length: 4 }, () =>
                    'ABCDEFGHJKLMNPQRSTUVWXYZ'[Math.floor(Math.random() * 24)]
                ).join('');
                sessionStorage.setItem('cf_peer_id', code);
            }
            return code;
        }

        function init() {
            const code = getOrCreateCode();
            peerIdEl.textContent = code;
            statusMsg.textContent = 'Waiting for device…';

            const peer = new Peer('castflow-' + code, {
                debug: 0,
            });

            peer.on('open', (id) => {
                console.log('Peer ready:', id);
                statusMsg.textContent = 'Waiting for device…';
            });

            peer.on('error', (err) => {
                console.error('Peer error:', err);
                if (err.type === 'unavailable-id') {
                    // Code taken — generate a new one
                    sessionStorage.removeItem('cf_peer_id');
                    peer.destroy();
                    init();
                } else {
                    statusMsg.textContent = 'Reconnecting…';
                    setTimeout(init, 3000);
                }
            });

            peer.on('disconnected', () => {
                statusMsg.textContent = 'Reconnecting…';
                peer.reconnect();
            });

            // ── Incoming media call (video stream) ───────────────────────────
            peer.on('call', (call) => {
                showToast('📱 Device connected');
                statusMsg.textContent = 'Starting stream…';
                call.answer(); // no local stream — we're receiver only

                call.on('stream', (remoteStream) => {
                    videoEl.srcObject = remoteStream;
                    videoEl.play().catch(() => {});
                    waitingScreen.style.display = 'none';
                    connectedBar.classList.add('show');
                    showToast('🎬 Stream started');
                });

                call.on('close', () => {
                    showToast('📵 Device disconnected');
                    connectedBar.classList.remove('show');
                    waitingScreen.style.display = 'flex';
                    statusMsg.textContent = 'Waiting for device…';
                    videoEl.srcObject = null;
                });

                call.on('error', (err) => {
                    console.error('Call error:', err);
                    showToast('❌ Stream error');
                });
            });

            // ── Incoming data connection (remote control) ────────────────────
            peer.on('connection', (conn) => {
                conn.on('data', (msg) => {
                    switch (msg.type) {
                        case 'play':
                            videoEl.play();
                            flashPlayPause('▶');
                            break;
                        case 'pause':
                            videoEl.pause();
                            flashPlayPause('⏸');
                            break;
                        case 'seek':
                            videoEl.currentTime = msg.time;
                            showOverlay();
                            break;
                        case 'seekRelative':
                            videoEl.currentTime = Math.max(0, Math.min(
                                videoEl.duration || 0,
                                videoEl.currentTime + msg.seconds
                            ));
                            flashSeek(msg.seconds);
                            showOverlay();
                            break;
                        case 'volume':
                            videoEl.volume = msg.volume;
                            break;
                        case 'metadata':
                            mediaTitle.textContent = msg.title;
                            break;
                    }
                });
            });
        }

        init();

        // ── OVERLAY ───────────────────────────────────────────────────────────
        function showOverlay() {
            overlay.classList.add('visible');
            state.overlayVisible = true;
            clearTimeout(state.hideTimer);
            state.hideTimer = setTimeout(() => {
                overlay.classList.remove('visible');
                state.overlayVisible = false;
            }, 5000);
        }

        function hideOverlay() {
            overlay.classList.remove('visible');
            state.overlayVisible = false;
        }

        videoEl.addEventListener('timeupdate', () => {
            const pct = videoEl.duration ? (videoEl.currentTime / videoEl.duration) * 100 : 0;
            progressFill.style.width = pct + '%';
            progressHandle.style.left = pct + '%';
            currentTimeEl.textContent = formatTime(videoEl.currentTime);
            durationEl.textContent    = formatTime(videoEl.duration);
        });

        videoEl.addEventListener('play',  () => { playStateEl.textContent = '⏸'; });
        videoEl.addEventListener('pause', () => { playStateEl.textContent = '▶'; });

        // ── FLASH ─────────────────────────────────────────────────────────────
        function flashPlayPause(icon) {
            playFlash.textContent = icon;
            playFlash.classList.add('flash');
            setTimeout(() => playFlash.classList.remove('flash'), 600);
            showOverlay();
        }

        function flashSeek(seconds) {
            const el = seconds < 0 ? seekBack : seekFwd;
            el.textContent = seconds < 0 ? `⏪ ${Math.abs(seconds)}s` : `${seconds}s ⏩`;
            el.classList.add('flash');
            setTimeout(() => el.classList.remove('flash'), 600);
        }

        // ── TV REMOTE ─────────────────────────────────────────────────────────
        document.addEventListener('keydown', e => {
            switch (e.keyCode) {
                case 13: case 32:
                    if (state.overlayVisible) {
                        videoEl.paused ? videoEl.play() : videoEl.pause();
                        flashPlayPause(videoEl.paused ? '⏸' : '▶');
                    } else { showOverlay(); }
                    e.preventDefault(); break;
                case 38: showOverlay(); e.preventDefault(); break;
                case 40: hideOverlay(); e.preventDefault(); break;
                case 37: case 412:
                    videoEl.currentTime = Math.max(0, videoEl.currentTime - 5);
                    flashSeek(-5); showOverlay(); e.preventDefault(); break;
                case 39: case 417:
                    videoEl.currentTime = Math.min(videoEl.duration || 0, videoEl.currentTime + 5);
                    flashSeek(5); showOverlay(); e.preventDefault(); break;
                case 415: videoEl.play(); flashPlayPause('▶'); break;
                case 19:  videoEl.pause(); flashPlayPause('⏸'); break;
            }
        });

        // ── TOAST ─────────────────────────────────────────────────────────────
        let toastTimer = null;
        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function formatTime(s) {
            if (!s || isNaN(s)) return '0:00';
            const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = Math.floor(s % 60);
            if (h > 0) return `${h}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
            return `${m}:${sec.toString().padStart(2,'0')}`;
        }

    })();
    </script>
</body>
</html>
